<!DOCTYPE html>
<html lang="en" data-theme="dark" data-palette="cool">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Myelocus">
<title>Myelocus</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <header class="header">
    <div class="logo" onclick="UI.go('today')" style="cursor:pointer">
      <div class="logo-mark">
        <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="7" cy="7" r="6" stroke="white" stroke-width="1.2" opacity=".3"/>
          <circle cx="7" cy="7" r="4" stroke="white" stroke-width="1.2" opacity=".6"/>
          <circle cx="7" cy="7" r="2" fill="white"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">Myelocus</div>
        <div class="logo-sub">Build your neural edge</div>
      </div>
    </div>
    <div class="header-center">
      <div class="countdown-chip">
        <div class="pace-dot on-track" id="pace-dot"></div>
        <span id="cdown-text"><strong>—</strong> days to Prelims</span>
      </div>
    </div>
    <div class="header-right">
      <div class="streak-chip" id="streak-chip">🔥 0 days</div>
      <button class="hbtn" onclick="UI.toggleTheme()" id="theme-icon" title="Toggle theme">☀</button>
      <button class="hbtn" onclick="UI.go('settings')" title="Settings">⚙</button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="nav-section">Study</div>
    <button class="nav-item active" id="nav-today" onclick="UI.go('today')">
      <span>⊙</span> Today's queue
      <span class="nav-badge" id="nav-due-badge" style="display:none"></span>
    </button>

    <div class="nav-section">Syllabus</div>
    <button class="nav-item" id="nav-gs1" onclick="UI.goPaper('gs1')">
      <span class="nav-dot" style="background:#818cf8"></span>GS 1<span class="nav-pct" id="np-gs1">—</span>
    </button>
    <button class="nav-item" id="nav-gs2" onclick="UI.goPaper('gs2')">
      <span class="nav-dot" style="background:#4ade80"></span>GS 2<span class="nav-pct" id="np-gs2">—</span>
    </button>
    <button class="nav-item" id="nav-gs3" onclick="UI.goPaper('gs3')">
      <span class="nav-dot" style="background:#fbbf24"></span>GS 3<span class="nav-pct" id="np-gs3">—</span>
    </button>
    <button class="nav-item" id="nav-gs4" onclick="UI.goPaper('gs4')">
      <span class="nav-dot" style="background:#c084fc"></span>GS 4<span class="nav-pct" id="np-gs4">—</span>
    </button>
    <button class="nav-item" id="nav-prelims" onclick="UI.goPaper('prelims')">
      <span class="nav-dot" style="background:#f87171"></span>Prelims<span class="nav-pct" id="np-prelims">—</span>
    </button>
    <button class="nav-item" id="nav-optional" onclick="UI.goPaper('optional')">
      <span class="nav-dot" style="background:#22d3ee"></span>Optional<span class="nav-pct" id="np-optional">—</span>
    </button>

    <div class="nav-section">Insights</div>
    <button class="nav-item" id="nav-pace" onclick="UI.go('pace')">
      <span>◎</span> Pace
    </button>
  </nav>

  <!-- MAIN — split pane for today + syllabus -->
  <div class="main-area" id="main-area">
    <!-- LEFT PANE -->
    <div class="left-pane" id="left-pane">
      <!-- Today -->
      <div class="page active" id="page-today">
        <div id="today-left"></div>
      </div>
      <!-- Syllabus -->
      <div class="page" id="page-syllabus">
        <div id="syllabus-left"></div>
      </div>
    </div>

    <!-- DIVIDER -->
    <div class="divider" id="divider"></div>

    <!-- RIGHT PANE -->
    <div class="right-pane" id="right-pane">
      <!-- Today right side -->
      <div class="page active" id="rpane-today">
        <div id="today-right"></div>
      </div>
      <!-- Chunk detail -->
      <div class="page" id="rpane-syllabus">
        <div id="chunk-detail"></div>
      </div>
    </div>
  </div>

  <!-- PACE — full width -->
  <div class="page-full" id="page-pace">
    <div id="c-pace"></div>
  </div>

  <!-- SETTINGS — full width -->
  <div class="page-full" id="page-settings">
    <div id="c-settings"></div>
  </div>

</div><!-- .shell -->

<!-- Mobile bottom nav -->
<nav class="bnav">
  <button class="bni active" id="bnav-today" onclick="UI.go('today')"><span class="bnic">⊙</span><span>Today</span></button>
  <button class="bni" id="bnav-syllabus" onclick="UI.goPaper('gs1')"><span class="bnic">⊞</span><span>Syllabus</span></button>
  <button class="bni" id="bnav-pace" onclick="UI.go('pace')"><span class="bnic">◎</span><span>Pace</span></button>
  <button class="bni" id="bnav-settings" onclick="UI.go('settings')"><span class="bnic">⚙</span><span>Settings</span></button>
</nav>

<div class="toast" id="toast"></div>

<!-- Danger confirm modal (subject deletion) -->
<div class="danger-overlay" id="danger-modal">
  <div class="danger-box">
    <div class="danger-title">⚠ Delete subject</div>
    <div class="danger-body" id="danger-modal-body"></div>
    <div class="danger-actions">
      <button class="btn btn-ghost" onclick="UI.cancelDeleteSubject()">Cancel</button>
      <button class="btn danger-confirm-btn" onclick="UI.confirmDeleteSubject()">Delete subject</button>
    </div>
  </div>
</div>

<script src="syllabus.js"></script>
<script src="engine.js"></script>
<script>

// ── UI CONTROLLER ─────────────────────────────────────────────────────────────
const UI = {
  currentPage: 'today',
  currentPaper: 'gs1',
  currentYear: 2027,
  selectedChunkId: null,
  expanded: {}, // tracks open subjects and bullets
  panelSplit: 55,

  init() {
    DB.load();
    this.currentYear = DB.settings.targetYear || 2027;
    this.applyTheme();
    this.initSplitPane();
    if (!Queue.restore()) Queue.build(DB.settings.dailyTarget || 6);
    this.updateHeader();
    this.updateNavPcts();
    this.renderToday();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  },

  applyTheme() {
    const th = DB.settings.theme || 'dark';
    const pa = DB.settings.palette || 'cool';
    document.documentElement.setAttribute('data-theme', th);
    document.documentElement.setAttribute('data-palette', pa);
    document.getElementById('theme-icon').textContent = th === 'dark' ? '☀' : '☾';
  },

  // ── SPLIT PANE ──────────────────────────────────────────────────────────────
  initSplitPane() {
    const saved = localStorage.getItem('myelocus_split');
    this.panelSplit = saved ? parseFloat(saved) : 55;
    this.applySplit();
    const divider = document.getElementById('divider');
    if (!divider) return;
    let dragging = false, startX = 0;
    divider.addEventListener('mousedown', e => {
      dragging = true; startX = e.clientX;
      divider.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    });
    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const ma = document.getElementById('main-area');
      if (!ma) return;
      const rect = ma.getBoundingClientRect();
      this.panelSplit = Math.max(25, Math.min(75, ((e.clientX - rect.left) / rect.width) * 100));
      this.applySplit();
    });
    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      divider.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      localStorage.setItem('myelocus_split', this.panelSplit);
    });
  },

  applySplit() {
    const lp = document.getElementById('left-pane');
    if (lp) lp.style.width = this.panelSplit + '%';
  },

  // ── NAVIGATION ──────────────────────────────────────────────────────────────
  go(page) {
    // Hide all
    document.querySelectorAll('.page,.page-full').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item,.bni').forEach(n => n.classList.remove('active'));
    const ma = document.getElementById('main-area');

    if (page === 'pace' || page === 'settings') {
      if (ma) ma.style.display = 'none';
      document.getElementById(`page-${page}`)?.classList.add('active');
    } else {
      if (ma) ma.style.display = 'flex';
      document.getElementById(`page-${page}`)?.classList.add('active');
      document.getElementById(`rpane-${page}`)?.classList.add('active');
    }

    document.getElementById(`nav-${page}`)?.classList.add('active');
    document.getElementById(`bnav-${page}`)?.classList.add('active');
    this.currentPage = page;

    if (page === 'today') this.renderToday();
    else if (page === 'pace') this.renderPace();
    else if (page === 'settings') this.renderSettings();
  },

  goPaper(paperId) {
    this.currentPaper = paperId;
    this.selectedChunkId = null;
    document.querySelectorAll('.page,.page-full').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item,.bni').forEach(n => n.classList.remove('active'));
    const ma = document.getElementById('main-area');
    if (ma) ma.style.display = 'flex';
    document.getElementById('page-syllabus')?.classList.add('active');
    document.getElementById('rpane-syllabus')?.classList.add('active');
    document.getElementById(`nav-${paperId}`)?.classList.add('active');
    document.getElementById('bnav-syllabus')?.classList.add('active');
    this.currentPage = 'syllabus';
    this.renderSyllabus();
    this.renderChunkDetail(null);
  },

  updateHeader() {
    const year = this.currentYear;
    const pace = Plan.pace(year);
    const streak = DB.settings.streak || 0;
    document.getElementById('cdown-text').innerHTML = `<strong>${pace.days}</strong> days to Prelims ${year}`;
    document.getElementById('pace-dot').className = `pace-dot ${pace.status}`;
    document.getElementById('streak-chip').textContent = `🔥 ${streak} day${streak !== 1 ? 's' : ''}`;
    const stats = Analytics.globalStats();
    const badge = document.getElementById('nav-due-badge');
    if (badge) { badge.textContent = stats.due; badge.style.display = stats.due > 0 ? '' : 'none'; }
  },

  updateNavPcts() {
    PAPER_ORDER.forEach(p => {
      const el = document.getElementById(`np-${p}`);
      if (!el) return;
      const stats = Analytics.paperStats(p);
      el.textContent = stats.total > 0 ? stats.cov + '%' : '—';
    });
  },

  toggleTheme() {
    DB.settings.theme = DB.settings.theme === 'dark' ? 'light' : 'dark';
    DB.save(); this.applyTheme();
  },

  toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  },

  // ── TODAY ────────────────────────────────────────────────────────────────────
  renderToday() {
    const target = DB.settings.dailyTarget || 6;
    const total = Queue.current.length;
    const done = Queue.doneCount();
    const pct = total > 0 ? Math.round(done / total * 100) : 0;
    const circ = 2 * Math.PI * 18;
    const offset = circ - (pct / 100) * circ;
    const phase = Plan.currentPhase(this.currentYear);
    const pace = Plan.pace(this.currentYear);
    const wd = Plan.weekDone();
    const stats = Analytics.globalStats();

    let qH = '';
    if (total === 0) {
      const hasChunks = DB.getAllChunks().length > 0;
      qH = `<div style="text-align:center;padding:40px 20px;color:var(--text3)">
        <div style="font-size:28px;margin-bottom:10px">◎</div>
        <div class="t-section" style="margin-bottom:6px">${hasChunks ? 'No chunks due today' : 'Your syllabus is empty'}</div>
        <div class="t-meta">${hasChunks ? 'SRS schedule is clear. Browse the syllabus to study new chunks.' : 'Go to GS 1, GS 2, etc. in the sidebar and add your UPSC bullets and chunks.'}</div>
      </div>`;
    } else {
      if (done >= total) {
        qH += `<div class="done-scr">
          <div class="done-icon">◎</div>
          <div class="done-t">Session complete</div>
          <div class="done-s">All ${done} chunks done. The pathways strengthen.</div>
          <div class="done-stats">
            <div class="ds"><div class="dsv" style="color:var(--accent)">${done}</div><div class="dsl">Today</div></div>
            <div class="ds"><div class="dsv" style="color:var(--c-amber)">🔥${DB.settings.streak||0}</div><div class="dsl">Streak</div></div>
            <div class="ds"><div class="dsv" style="color:var(--c-green)">${stats.strong}</div><div class="dsl">Strong</div></div>
          </div>
          <button class="btn btn-ghost" onclick="Queue.build(${target});UI.renderToday();">Load more</button>
        </div>`;
      }

      Queue.current.forEach((item, idx) => {
        const st = Queue.cardStates[idx] || { done:false, score:null, open:false };
        const rec = DB.getRecord(item.chunk.id) || {};
        const paper = PAPERS[item.paperId];
        const g2c = SRS.gapClass(rec.gap2Remaining);
        const g3c = SRS.gapClass(rec.gap3Remaining);
        const bstyle = st.done ? 'done' : st.open ? 'open' : '';

        qH += `<div class="qcard ${bstyle}">
          <div class="qcard-head" onclick="UI.toggleCard(${idx})">
            <div class="qnum" style="${st.done?'background:var(--c-green-bg);color:var(--c-green)':st.open?'background:var(--accent-bg);color:var(--accent)':''}">${st.done?'✓':idx+1}</div>
            <div class="qchunk">${item.chunk.name}</div>
            <div class="gap-dots">
              <div class="gdot ${rec.gap1Done?'done':''}" title="First exposure"></div>
              <div class="gdot ${g2c}" title="PYQ seen"></div>
              <div class="gdot ${g3c}" title="PYQ attempted"></div>
            </div>
            <span class="qpaper-badge" style="background:${paper.color}20;color:${paper.color}">${paper.label}</span>
            <span class="qarr">${st.open?'▴':'▾'}</span>
          </div>
          ${st.open ? `<div class="qbody">
            <div class="activity-section">
              <div class="activity-label">Log today's session on this chunk</div>
              <div class="activity-rows">
                ${[['lecture','Lecture'],['ncert','NCERT'],['pyq-seen','PYQ seen'],['pyq-attempted','PYQ attempted'],['reference','Reference/Internet']].map(([key,label]) => `
                <div class="activity-row">
                  <label class="activity-check">
                    <input type="checkbox" id="act-${idx}-${key}" onchange="UI.toggleMins(${idx},'${key}')">
                    <span class="alabel">${label}</span>
                  </label>
                  <div class="activity-mins" id="amins-${idx}-${key}" style="display:none">
                    <input class="mins-input" type="number" id="mins-${idx}-${key}" min="1" max="300" placeholder="0">
                    <span class="mins-label">min</span>
                  </div>
                </div>`).join('')}
              </div>
              <div class="card-actions" style="display:flex;justify-content:space-between;align-items:center">
                <button class="btn btn-ghost btn-sm" onclick="UI.saveActivity(${idx})">Save activity</button>
                <button class="btn btn-primary btn-sm" onclick="UI.doneCard(${idx})" style="margin-left:auto">Done ✓</button>
              </div>
            </div>
          </div>` : ''}
        </div>`;
      });
    }

    // Left pane
    document.getElementById('today-left').innerHTML = `
    <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:16px">
      <div class="t-page">Today</div>
      <div class="t-meta">${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})}</div>
    </div>
    <div class="session-ring-wrap">
      <svg width="44" height="44" viewBox="0 0 44 44">
        <circle cx="22" cy="22" r="18" fill="none" stroke="var(--bg3)" stroke-width="4"/>
        <circle cx="22" cy="22" r="18" fill="none" stroke="var(--accent)" stroke-width="4"
          stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"
          stroke-linecap="round" transform="rotate(-90 22 22)"
          style="transition:stroke-dashoffset 0.5s ease"/>
      </svg>
      <div class="ring-info"><h3>${done} / ${total} done</h3><p>Interleaved · target ${target}</p></div>
      <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="Queue.build(${target});UI.renderToday();">↺ Refresh</button>
    </div>
    ${qH}`;

    // Right pane
    document.getElementById('today-right').innerHTML = `<div class="today-side">
      <div class="scard">
        <div class="scard-t">Add any chunk to today</div>
        <input class="field" type="text" id="chunk-search-inp" placeholder="Search chunks..." style="font-size:12px;padding:5px 8px;margin-bottom:6px"
          oninput="UI.renderChunkSearch(this.value)">
        <div id="chunk-search-results" style="max-height:180px;overflow-y:auto"></div>
      </div>
      <div class="scard">
        <div class="scard-t">Current phase</div>
        <div class="t-section" style="margin-bottom:4px">${phase?.name||'—'}</div>
        <div style="font-size:12px;color:var(--text2);line-height:1.5">${phase?.note||''}</div>
      </div>
      <div class="scard">
        <div class="scard-t">This week</div>
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
          <span style="font-size:18px;font-weight:600">${wd}</span>
          <span class="t-meta">target: ${phase?.weekly||6}</span>
        </div>
        <div class="btrack"><div class="bfill" style="width:${Math.min(100,Math.round(wd/Math.max(phase?.weekly||6,1)*100))}%;background:var(--accent)"></div></div>
      </div>
      <div class="scard">
        <div class="scard-t">Pace</div>
        <div class="pace-row"><span class="lbl">Days to exam</span><span class="val">${pace.days}</span></div>
        <div class="pace-row"><span class="lbl">Unseen chunks</span><span class="val">${pace.unseen}</span></div>
        <div class="pace-row"><span class="lbl">Status</span><span class="val ${pace.status}">${pace.status.replace('-',' ')}</span></div>
        <div class="t-meta" style="margin-top:6px;font-style:italic">${pace.msg}</div>
      </div>
      <div class="scard">
        <div class="scard-t">Queue breakdown</div>
        <div style="display:flex;gap:12px">
          <div style="text-align:center"><div style="font-size:18px;font-weight:600;color:var(--c-red)">${stats.overdue}</div><div class="t-meta">overdue</div></div>
          <div style="text-align:center"><div style="font-size:18px;font-weight:600;color:var(--c-amber)">${Math.max(0,stats.due-stats.overdue)}</div><div class="t-meta">due</div></div>
          <div style="text-align:center"><div style="font-size:18px;font-weight:600;color:var(--c-green)">${stats.strong}</div><div class="t-meta">strong</div></div>
          <div style="text-align:center"><div style="font-size:18px;font-weight:600;color:var(--text3)">${stats.unseen}</div><div class="t-meta">unseen</div></div>
        </div>
      </div>
    </div>`;
  },

  toggleCard(idx) { Queue.toggleCard(idx); this.renderToday(); },
  doneCard(idx) {
    // Save any checked activity first
    const acts=[];
    ['lecture','ncert','pyq-seen','pyq-attempted','reference'].forEach(key=>{ const cb=document.getElementById(`act-${idx}-${key}`); const mi=document.getElementById(`mins-${idx}-${key}`); if(cb?.checked&&mi?.value) acts.push({medium:key,mins:parseInt(mi.value)||0}); });
    if (acts.length) Queue.logActivity(idx, acts);
    Queue.cardStates[idx]={done:true,score:3,open:false}; Queue.saveState();
    this.updateHeader(); this.updateNavPcts(); this.renderToday();
    const totalMins = acts.reduce((s,a)=>s+a.mins,0);
    this.toast(totalMins > 0 ? `Done ✓ — ${totalMins} mins logged` : 'Done ✓');
  },

  renderChunkSearch(query) {
    const el = document.getElementById('chunk-search-results');
    if (!el) return;
    if (!query || query.length < 2) { el.innerHTML = '<div class="t-meta" style="padding:4px 0">Type to search all chunks</div>'; return; }
    const q = query.toLowerCase();
    const all = DB.getAllChunks();
    const inQueue = new Set(Queue.current.map(i => i.chunk.id));
    const matches = all.filter(({chunk}) => chunk.name.toLowerCase().includes(q) && !inQueue.has(chunk.id)).slice(0, 8);
    if (!matches.length) { el.innerHTML = '<div class="t-meta" style="padding:4px 0">No results</div>'; return; }
    el.innerHTML = matches.map(({chunk, paperId}) => {
      const p = PAPERS[paperId];
      return `<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border)">
        <span style="flex:1;font-size:12px;color:var(--text)">${chunk.name}</span>
        <span style="font-size:10px;color:${p.color};background:${p.color}20;padding:1px 5px;border-radius:3px">${p.label}</span>
        <button class="btn btn-ghost btn-sm" style="padding:2px 7px;font-size:11px" onclick="UI.addChunkToQueue('${chunk.id}','${paperId}')">+ Add</button>
      </div>`;
    }).join('');
  },

  addChunkToQueue(chunkId, paperId) {
    // Find the full item
    let found = null;
    for (const subj of DB.getSubjects(paperId)) {
      for (const bullet of DB.getBullets(paperId, subj.id)) {
        const c = bullet.chunks.find(ch => ch.id === chunkId);
        if (c) { found = { chunk: c, paperId, subjId: subj.id, bulletId: bullet.id }; break; }
      }
      if (found) break;
    }
    if (!found) return;
    const newIdx = Queue.current.length;
    Queue.current.push(found);
    Queue.cardStates[newIdx] = { done: false, score: null, open: false };
    Queue.saveState();
    // Clear search
    const inp = document.getElementById('chunk-search-inp');
    if (inp) inp.value = '';
    const res = document.getElementById('chunk-search-results');
    if (res) res.innerHTML = '';
    this.renderToday();
    this.toast(`Added: ${found.chunk.name}`);
  },
  markStudied(idx) { Queue.markStudied(idx); this.updateHeader(); this.updateNavPcts(); this.renderToday(); this.toast('Studied ✓'); },
  rateCard(idx, score) { Queue.rateCard(idx, score); this.updateHeader(); this.updateNavPcts(); this.renderToday(); const L=['','Again — tomorrow','Hard — short interval','Good — interval grows','Easy — accelerated']; this.toast(L[score]); },
  toggleMins(idx, key) { const cb=document.getElementById(`act-${idx}-${key}`); const mw=document.getElementById(`amins-${idx}-${key}`); if(mw) mw.style.display=cb?.checked?'flex':'none'; },
  saveActivity(idx) {
    const acts=[];
    ['lecture','ncert','pyq-seen','pyq-attempted','reference'].forEach(key=>{ const cb=document.getElementById(`act-${idx}-${key}`); const mi=document.getElementById(`mins-${idx}-${key}`); if(cb?.checked&&mi?.value) acts.push({medium:key,mins:parseInt(mi.value)||0}); });
    if (!acts.length) { this.toast('Nothing to save'); return; }
    Queue.logActivity(idx, acts);
    this.updateHeader(); this.renderToday();
    this.toast(`${acts.reduce((s,a)=>s+a.mins,0)} mins logged ✓`);
  },

  // ── SYLLABUS ─────────────────────────────────────────────────────────────────
  renderSyllabus() {
    const paperId = this.currentPaper;
    const paper = PAPERS[paperId];
    const pStats = Analytics.paperStats(paperId);

    let h = `
    <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:12px">
      <div class="t-page">${paper.label}</div>
      <div class="t-meta">${paper.full}</div>
    </div>
    <div class="paper-tabs">
      ${PAPER_ORDER.map(p => `<button class="ptab ${p===paperId?'active':''}" style="${p===paperId?'background:'+PAPERS[p].color+';border-color:'+PAPERS[p].color:''}" onclick="UI.goPaper('${p}')">${PAPERS[p].label}</button>`).join('')}
    </div>
    <div class="t-meta" style="margin-bottom:12px">
      ○ ◑ ● = first exposure / PYQ seen / PYQ attempted &nbsp;·&nbsp; Click chunk to open detail on right
    </div>`;

    DB.getSubjects(paperId).forEach(subj => {
      const coaching = DB.getCoaching(paperId, subj.id);
      const cpct = coaching.total > 0 ? Math.round(coaching.completed/coaching.total*100) : 0;
      const subKey = `s-${paperId}-${subj.id}`;
      const isOpen = !!this.expanded[subKey];
      const bullets = DB.getBullets(paperId, subj.id);

      h += `<div class="subject-block">
        <div class="subject-hdr" onclick="UI.selectSubject('${paperId}','${subj.id}');UI.toggleKey('${subKey}',true)">
          <span class="subject-name" contenteditable="true" spellcheck="false"
            onclick="event.stopPropagation()"
            onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
            onblur="UI.saveSubjectName('${paperId}','${subj.id}',this.textContent.trim())"
            title="Click to rename subject">${subj.name}</span>
          <div class="subject-meta">
            <button class="btn btn-ghost btn-sm subj-del-btn" title="Delete subject"
              onclick="event.stopPropagation();UI.askDeleteSubject('${paperId}','${subj.id}')">🗑 Delete</button>
            <span class="subject-arr">${isOpen?'▴':'▾'}</span>
          </div>
        </div>

        ${isOpen ? `
        <!-- Coaching row -->
        <div class="coaching-row">
          <span class="coaching-label">🎓 Coaching</span>
          <div class="coaching-inputs">
            <input class="cinp cinp-wide" type="text" placeholder="Academy name" value="${coaching.academy||''}"
              onchange="UI.saveCoaching('${paperId}','${subj.id}',this,'academy')">
            <span class="cinp-lbl">Total</span>
            <input class="cinp cinp-num" type="number" min="0" placeholder="0" value="${coaching.total||''}"
              onchange="UI.saveCoaching('${paperId}','${subj.id}',this,'total')">
            <span class="cinp-lbl">Done</span>
            <input class="cinp cinp-num" type="number" min="0" placeholder="0" value="${coaching.completed||''}"
              onchange="UI.saveCoaching('${paperId}','${subj.id}',this,'completed')">
            ${coaching.total > 0 ? `<span class="coaching-pct">${cpct}%</span>` : ''}
          </div>
        </div>

        <!-- Bullets -->
        ${bullets.map(bullet => {
          const bulKey = `b-${bullet.id}`;
          const isBulOpen = !!this.expanded[bulKey];
          const covCount = bullet.chunks.filter(c => DB.getRecord(c.id)?.firstStudied).length;

          return `<div class="bullet-block">
            <div class="bullet-hdr" onclick="UI.toggleKey('${bulKey}',false)">
              <div class="bullet-official-edit" contenteditable="true" spellcheck="false"
                onblur="UI.saveBulletOfficial('${paperId}','${subj.id}','${bullet.id}',this.textContent.trim())"
                onclick="event.stopPropagation()"
                title="Click to edit the official bullet text">${bullet.official}</div>
              <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
                ${bullet.chunks.length > 0 ? `<span class="t-meta">${covCount}/${bullet.chunks.length}</span>` : ''}
                <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();UI.deleteBullet('${paperId}','${subj.id}','${bullet.id}')" style="padding:2px 6px;font-size:10px;color:var(--c-red);border-color:var(--c-red)">✕</button>
                <span class="bullet-arr">${isBulOpen?'▴':'▾'}</span>
              </div>
            </div>

            ${isBulOpen ? `
            ${bullet.chunks.map(chunk => {
              const rec = DB.getRecord(chunk.id) || {};
              const isSel = this.selectedChunkId === chunk.id;
              return `<div class="chunk-row ${isSel?'selected':''}" onclick="UI.selectChunk('${chunk.id}')">
                <div class="chunk-name" contenteditable="true" spellcheck="false"
                  onclick="event.stopPropagation()"
                  onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
                  onblur="UI.saveChunkName('${paperId}','${subj.id}','${bullet.id}','${chunk.id}',this.textContent.trim())"
                  title="Click to rename chunk">${chunk.name}</div>
                <div class="gap-dots">
                  <div class="gdot ${rec.gap1Done?'done':''}" title="First exposure"></div>
                  <div class="gdot ${SRS.gapClass(rec.gap2Remaining)}" title="PYQ seen"></div>
                  <div class="gdot ${SRS.gapClass(rec.gap3Remaining)}" title="PYQ attempted"></div>
                </div>
                <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();UI.deleteChunk('${paperId}','${subj.id}','${bullet.id}','${chunk.id}')" style="padding:2px 5px;font-size:10px;color:var(--c-red);border-color:var(--c-red)">✕</button>
              </div>`;
            }).join('')}

            <!-- Add chunk -->
            <div class="add-chunk-row">
              <div class="add-chunk-form">
                <input class="field" type="text" id="ci-${bullet.id}" placeholder="Add chunk — e.g. Industrial Revolution" style="font-size:12px;padding:5px 8px"
                  onkeydown="if(event.key==='Enter'){UI.addChunk('${paperId}','${subj.id}','${bullet.id}');event.preventDefault()}">
                <button class="btn btn-ghost btn-sm" onclick="UI.addChunk('${paperId}','${subj.id}','${bullet.id}')">+ Add</button>
              </div>
            </div>` : ''}
          </div>`;
        }).join('')}

        <!-- Add bullet -->
        <div style="padding:8px 14px;border-top:1px solid var(--border)">
          <div style="display:flex;gap:6px">
            <input class="field" type="text" id="bi-${paperId}-${subj.id}" placeholder="Paste UPSC official bullet point here..." style="font-size:12px;padding:5px 8px"
              onkeydown="if(event.key==='Enter'){UI.addBullet('${paperId}','${subj.id}');event.preventDefault()}">
            <button class="btn btn-ghost btn-sm" onclick="UI.addBullet('${paperId}','${subj.id}')">+ Bullet</button>
          </div>
        </div>` : ''}
      </div>`;
    });

    // Add subject
    h += `<div class="add-subject-row">
      <input class="field" type="text" id="si-${paperId}" placeholder="Add a new subject to ${paper.label}..." style="font-size:12px;padding:6px 10px"
        onkeydown="if(event.key==='Enter'){UI.addSubject('${paperId}');event.preventDefault()}">
      <button class="btn btn-ghost btn-sm" onclick="UI.addSubject('${paperId}')">+ Subject</button>
    </div>`;

    document.getElementById('syllabus-left').innerHTML = h;
  },

  toggleKey(key, isSubject) {
    this.expanded[key] = !this.expanded[key];
    if (isSubject) this.renderSyllabus();
    else this.renderSyllabus();
  },

  saveBulletLabel(paperId, subjId, bulletId, label) {
    if (label) DB.updateBulletLabel(paperId, subjId, bulletId, label);
  },

  saveBulletOfficial(paperId, subjId, bulletId, text) {
    if (text) DB.updateBulletOfficial(paperId, subjId, bulletId, text);
    else this.renderSyllabus();
  },

  saveChunkName(paperId, subjId, bulletId, chunkId, name) {
    if (name) { DB.updateChunkName(paperId, subjId, bulletId, chunkId, name); if (this.selectedChunkId === chunkId) this.renderChunkDetail(chunkId); }
    else this.renderSyllabus();
  },

  saveSubjectName(paperId, subjId, name) {
    if (name) { DB.updateSubjectName(paperId, subjId, name); }
    else this.renderSyllabus();
  },

  addSubject(paperId) {
    const inp = document.getElementById(`si-${paperId}`);
    const name = inp?.value?.trim();
    if (!name) { this.toast('Enter a subject name'); return; }
    DB.addSubject(paperId, name);
    inp.value = '';
    this.renderSyllabus(); this.updateNavPcts();
    this.toast('Subject added ✓');
  },

  // Subject deletion uses a distinct red danger modal (not the browser confirm)
  askDeleteSubject(paperId, subjId) {
    const subj = DB.getSubjects(paperId).find(s => s.id === subjId);
    const bullets = DB.getBullets(paperId, subjId);
    const chunkCount = bullets.reduce((n, b) => n + (b.chunks?.length || 0), 0);
    this._pendingSubjDelete = { paperId, subjId };
    const modal = document.getElementById('danger-modal');
    document.getElementById('danger-modal-body').innerHTML =
      `Delete the subject <strong>"${subj ? subj.name : ''}"</strong>?<br><br>` +
      `This permanently removes <strong>${bullets.length} bullet${bullets.length!==1?'s':''}</strong> and ` +
      `<strong>${chunkCount} chunk${chunkCount!==1?'s':''}</strong> inside it, along with all their study progress, ` +
      `coaching data, and SRS history. <span style="color:var(--c-red)">This cannot be undone.</span>`;
    modal.classList.add('show');
  },
  cancelDeleteSubject() {
    this._pendingSubjDelete = null;
    document.getElementById('danger-modal').classList.remove('show');
  },
  confirmDeleteSubject() {
    const p = this._pendingSubjDelete;
    document.getElementById('danger-modal').classList.remove('show');
    if (!p) return;
    DB.deleteSubject(p.paperId, p.subjId);
    this._pendingSubjDelete = null;
    if (this.selectedSubject && this.selectedSubject.subjId === p.subjId) { this.selectedSubject = null; this.renderChunkDetail(null); }
    this.updateHeader(); this.updateNavPcts(); this.renderSyllabus();
    this.toast('Subject deleted');
  },

  saveCoaching(paperId, subjId, el, field) {
    const c = DB.getCoaching(paperId, subjId);
    c[field] = field === 'academy' ? el.value : parseInt(el.value) || 0;
    DB.setCoaching(paperId, subjId, c);
  },

  addBullet(paperId, subjId) {
    const inp = document.getElementById(`bi-${paperId}-${subjId}`);
    const text = inp?.value?.trim();
    if (!text) { this.toast('Enter the official bullet text'); return; }
    DB.addBullet(paperId, subjId, text);
    inp.value = '';
    this.renderSyllabus();
    this.toast('Bullet added ✓');
  },

  deleteBullet(paperId, subjId, bulletId) {
    if (!confirm('Delete this bullet and all its chunks?')) return;
    DB.deleteBullet(paperId, subjId, bulletId);
    this.renderSyllabus();
    this.toast('Deleted');
  },

  addChunk(paperId, subjId, bulletId) {
    const inp = document.getElementById(`ci-${bulletId}`);
    const name = inp?.value?.trim();
    if (!name) { this.toast('Enter chunk name'); return; }
    const chunk = DB.addChunk(paperId, subjId, bulletId, name);
    inp.value = '';
    this.renderSyllabus();
    this.toast('Chunk added ✓');
  },

  deleteChunk(paperId, subjId, bulletId, chunkId) {
    if (!confirm('Delete this chunk and all its progress?')) return;
    DB.deleteChunk(paperId, subjId, bulletId, chunkId);
    if (this.selectedChunkId === chunkId) { this.selectedChunkId = null; this.renderChunkDetail(null); }
    this.updateHeader(); this.updateNavPcts(); this.renderSyllabus();
    this.toast('Deleted');
  },

  selectSubject(paperId, subjId) {
    this.selectedChunkId = null;
    this.selectedSubject = { paperId, subjId };
    this.renderSubjectDetail(paperId, subjId);
  },

  renderSubjectDetail(paperId, subjId) {
    const el = document.getElementById('chunk-detail');
    if (!el) return;
    const paper = PAPERS[paperId];
    const subj = DB.getSubjects(paperId).find(s => s.id === subjId);
    if (!subj) return;
    const ss = Analytics.subjectStats(paperId, subjId);
    const ch = DB.getCoaching(paperId, subjId);
    const cpct = ch.total > 0 ? Math.round(ch.completed / ch.total * 100) : 0;
    const totalT = ss.total || 1;

    // Three bar widths
    const barG1 = Math.round(ss.gap1 / totalT * 100);
    const barG2 = Math.round(ss.gap2 / totalT * 100);
    const barG3 = Math.round(ss.gap3 / totalT * 100);

    el.innerHTML = `
    <div class="chunk-detail-paper" style="color:${paper.color}">${paper.label}</div>
    <div class="chunk-detail-name">${subj.name}</div>
    <div class="t-meta" style="margin-bottom:16px">${ss.total} chunks · ${ss.cov}% covered · ${fmtMins(ss.totalMins)} invested</div>

    ${ch.total > 0 ? `
    <div class="detail-section">
      <div class="detail-label">Coaching lectures</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:6px">${ch.academy||'Academy'} — ${ch.completed} of ${ch.total} done</div>
      <div class="btrack" style="height:8px;margin-bottom:4px">
        <div class="bfill" style="width:${cpct}%;background:${paper.color};height:100%"></div>
      </div>
      <div style="font-size:11px;color:${cpct>=80?'var(--c-green)':cpct>=50?'var(--c-amber)':'var(--c-red)'}">
        ${cpct}% complete
      </div>
    </div>` : `
    <div class="detail-section">
      <div class="detail-label">Coaching lectures</div>
      <div class="t-meta">No coaching data yet — add from the subject header</div>
    </div>`}

    <div class="detail-section">
      <div class="detail-label">Learning pipeline</div>

      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:4px">
          <span>First exposure</span>
          <span style="color:${barG1>=80?'var(--c-green)':barG1>=40?'var(--c-amber)':'var(--text3)'}">${ss.gap1}/${ss.total}</span>
        </div>
        <div class="btrack" style="height:8px">
          <div class="bfill" style="width:${barG1}%;background:${barG1>=80?'var(--c-green)':barG1>=40?'var(--c-amber)':'var(--c-red)'};height:100%"></div>
        </div>
      </div>

      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:4px">
          <span>PYQ seen</span>
          <span style="color:${barG2>=80?'var(--c-green)':barG2>=40?'var(--c-amber)':'var(--text3)'}">${ss.gap2}/${ss.total}</span>
        </div>
        <div class="btrack" style="height:8px">
          <div class="bfill" style="width:${barG2}%;background:${barG2>=80?'var(--c-green)':barG2>=40?'var(--c-amber)':'var(--c-red)'};height:100%"></div>
        </div>
      </div>

      <div style="margin-bottom:4px">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:4px">
          <span>PYQ attempted</span>
          <span style="color:${barG3>=80?'var(--c-green)':barG3>=40?'var(--c-amber)':'var(--text3)'}">${ss.gap3}/${ss.total}</span>
        </div>
        <div class="btrack" style="height:8px">
          <div class="bfill" style="width:${barG3}%;background:${barG3>=80?'var(--c-green)':barG3>=40?'var(--c-amber)':'var(--c-red)'};height:100%"></div>
        </div>
      </div>
      <div class="t-meta" style="margin-top:8px">The gap between these three bars is where your preparation risk lives.</div>
    </div>

    <div class="detail-section">
      <div class="detail-label">Coverage</div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:4px">
        <span>Chunks studied</span>
        <span>${ss.studied}/${ss.total}</span>
      </div>
      <div class="btrack" style="height:8px">
        <div class="bfill" style="width:${ss.cov}%;background:${paper.color};height:100%"></div>
      </div>
    </div>`;
  },
  selectChunk(chunkId) {
    this.selectedChunkId = chunkId;
    this.renderChunkDetail(chunkId);
    this.renderSyllabus();
  },

  openDetail(chunkId) {
    this.selectedChunkId = chunkId;
    if (this.currentPage !== 'syllabus') {
      this.goPaper(this.currentPaper);
      setTimeout(() => { this.renderChunkDetail(chunkId); }, 50);
    } else {
      this.renderChunkDetail(chunkId);
    }
  },

  // ── CHUNK DETAIL ─────────────────────────────────────────────────────────────
  renderChunkDetail(chunkId) {
    const el = document.getElementById('chunk-detail');
    if (!el) return;

    if (!chunkId) {
      el.innerHTML = `<div class="right-pane-empty">
        <div class="icon">◎</div>
        <div class="t-section">No chunk selected</div>
        <div class="t-meta" style="margin-top:6px">Click any chunk in the syllabus to see its detail here</div>
      </div>`;
      return;
    }

    // Find chunk
    let foundChunk=null, foundBullet=null, foundPaper=null, foundPaperId=null;
    for (const paperId of PAPER_ORDER) {
      for (const subj of DB.getSubjects(paperId)) {
        for (const bullet of DB.getBullets(paperId, subj.id)) {
          const c = bullet.chunks.find(c => c.id === chunkId);
          if (c) { foundChunk=c; foundBullet=bullet; foundPaper=PAPERS[paperId]; foundPaperId=paperId; break; }
        }
        if (foundChunk) break;
      }
      if (foundChunk) break;
    }
    if (!foundChunk) { el.innerHTML='<div class="t-meta" style="padding:20px">Chunk not found</div>'; return; }

    const rec = DB.getRecord(chunkId) || SRS.newRecord();
    const totalM = SRS.totalMins(rec);
    const allMins = SRS.totalAllMins(rec);
    const g2c = SRS.gapClass(rec.gap2Remaining);
    const g3c = SRS.gapClass(rec.gap3Remaining);
    const recent = (rec.activityLog||[]).slice(-6).reverse();
    const ML = {lecture:'Lecture',ncert:'NCERT','pyq-seen':'PYQ seen','pyq-attempted':'PYQ attempted',reference:'Reference/Internet'};

    el.innerHTML = `
    <div class="chunk-detail-paper" style="color:${foundPaper.color}">${foundPaper.label}</div>
    <div class="chunk-detail-name">${foundChunk.name}</div>
    <div class="chunk-detail-official">${foundBullet.official}</div>

    <!-- Three gaps -->
    <div class="detail-section">
      <div class="detail-label">Learning pipeline</div>
      <div class="gaps-row">
        <div class="gap-item ${rec.gap1Done?'done':''}" onclick="UI.toggleGap1('${chunkId}')">
          <div class="gap-circle">${rec.gap1Done?'✓':''}</div>
          <div class="gap-title">First exposure</div>
          <div class="t-meta" style="margin-top:3px">${rec.gap1Done?'Done':'Not yet'}</div>
        </div>
        <div class="gap-item ${g2c}">
          <div class="gap-circle">${rec.gap2Remaining==='done'?'✓':rec.gap2Remaining==='little'?'◑':''}</div>
          <div class="gap-title">PYQ seen</div>
          <select class="pyq-remaining-select" style="margin-top:5px" onchange="UI.setGap2('${chunkId}',this.value)">
            <option value="all" ${(!rec.gap2Remaining||rec.gap2Remaining==='all')?'selected':''}>All left</option>
            <option value="most" ${rec.gap2Remaining==='most'?'selected':''}>Most left</option>
            <option value="some" ${rec.gap2Remaining==='some'?'selected':''}>Some left</option>
            <option value="little" ${rec.gap2Remaining==='little'?'selected':''}>A little left</option>
            <option value="done" ${rec.gap2Remaining==='done'?'selected':''}>Done ✓</option>
          </select>
        </div>
        <div class="gap-item ${g3c}">
          <div class="gap-circle">${rec.gap3Remaining==='done'?'✓':rec.gap3Remaining==='little'?'◑':''}</div>
          <div class="gap-title">PYQ attempted</div>
          <select class="pyq-remaining-select" style="margin-top:5px" onchange="UI.setGap3('${chunkId}',this.value)">
            <option value="all" ${(!rec.gap3Remaining||rec.gap3Remaining==='all')?'selected':''}>All left</option>
            <option value="most" ${rec.gap3Remaining==='most'?'selected':''}>Most left</option>
            <option value="some" ${rec.gap3Remaining==='some'?'selected':''}>Some left</option>
            <option value="little" ${rec.gap3Remaining==='little'?'selected':''}>A little left</option>
            <option value="done" ${rec.gap3Remaining==='done'?'selected':''}>Done ✓</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Time invested -->
    <div class="detail-section">
      <div class="detail-label">Time invested — ${allMins > 0 ? fmtMins(allMins) + ' total' : 'nothing logged yet'}</div>
      ${allMins > 0 ? `<div class="time-summary">
        ${Object.entries(ML).map(([key,label])=>{ const m=totalM[key]||0; return m>0?`<div class="time-row"><span class="time-medium">${label}</span><span class="time-val">${fmtMins(m)}</span></div>`:''; }).join('')}
      </div>` : `<div class="t-meta">Log activity from Today's queue — open any chunk in today's queue to log time.</div>`}
    </div>

    <!-- Recent activity -->
    ${recent.length > 0 ? `<div class="detail-section">
      <div class="detail-label">Recent activity</div>
      <div class="activity-hist">
        ${recent.map(e=>`<div class="hist-entry"><span class="hist-date">${e.date}</span><span class="hist-medium">${ML[e.medium]||e.medium}</span><span class="hist-mins">${fmtMins(e.mins)}</span></div>`).join('')}
      </div>
    </div>` : ''}

    <!-- SRS -->
    <div class="detail-section">
      <div class="detail-label">SRS history</div>
      <div class="srs-hist">
        ${rec.firstStudied?`First studied: ${fmtDate(rec.firstStudied)}<br>`:'<span style="color:var(--text3)">Not yet studied</span>'}
        ${rec.lastStudied?`Last studied: ${fmtDate(rec.lastStudied)}<br>`:''}
        ${rec.nextReview?`Next review: ${fmtDate(rec.nextReview)} (${rec.interval}d interval)<br>`:''}
        ${rec.repetitions?`Repetitions: ${rec.repetitions}<br>`:''}
        ${rec.lastScore?`Last recall: ${['','Again','Hard','Good','Easy'][rec.lastScore]}<br>`:''}
        ${rec.firstStudied?`Strength: ${SRS.strength(rec)}%`:''}
      </div>
    </div>

    <!-- Curious question -->
    <div class="detail-section">
      <div class="detail-label">Your curious question</div>
      <textarea class="field" id="cq-inp" rows="2" placeholder="Why does this matter? What if...? How does this connect to...?"
        onblur="UI.saveCQ('${chunkId}')">${rec.curiousQ||''}</textarea>
      ${rec.curiousQ?`<label style="display:flex;align-items:center;gap:6px;margin-top:6px;font-size:12px;cursor:pointer">
        <input type="checkbox" ${rec.curiousAnswered?'checked':''} onchange="UI.saveCQAnswered('${chunkId}',this.checked)" style="accent-color:var(--accent)">
        <span style="color:var(--text2)">Answered</span>
      </label>`:''}
    </div>

    <!-- Notes -->
    <div class="detail-section">
      <div class="detail-label">Notes</div>
      <textarea class="field" id="notes-inp" rows="4" placeholder="Key points, connections, sources, things to remember..."
        onblur="UI.saveNotes('${chunkId}')">${rec.notes||''}</textarea>
    </div>

    <!-- AI hooks -->
    <div class="detail-section">
      <div class="detail-label">AI features <span class="t-meta">(coming soon)</span></div>
      <div style="display:flex;flex-direction:column;gap:5px">
        ${['Explain this chunk for UPSC Mains','Generate 5 probable questions','Link to recent current affairs'].map(label=>`
        <button style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg3);border:1px dashed var(--border2);border-radius:var(--radius);font-size:12px;color:var(--text3);width:100%;cursor:not-allowed" disabled>
          ${label} <span style="margin-left:auto;font-size:10px;background:var(--bg4);padding:2px 5px;border-radius:4px">AI</span>
        </button>`).join('')}
      </div>
    </div>`;
  },

  toggleGap1(chunkId) {
    const rec = DB.getRecord(chunkId) || SRS.newRecord();
    rec.gap1Done = !rec.gap1Done;
    DB.setRecord(chunkId, rec);
    this.renderChunkDetail(chunkId);
    if (this.currentPage === 'syllabus') this.renderSyllabus();
    this.toast(rec.gap1Done ? 'Gap 1 closed ✓' : 'Gap 1 reopened');
  },
  setGap2(chunkId, val) {
    const rec=DB.getRecord(chunkId)||SRS.newRecord(); rec.gap2Remaining=val; DB.setRecord(chunkId,rec);
    if(this.currentPage==='syllabus') this.renderSyllabus();
    const L={'all':'PYQ seen — all left','most':'PYQ seen — most left','some':'PYQ seen — some left','little':'PYQ seen — a little left','done':'PYQ seen — done ✓'};
    this.toast(L[val]||'Saved');
  },
  setGap3(chunkId, val) {
    const rec=DB.getRecord(chunkId)||SRS.newRecord(); rec.gap3Remaining=val; DB.setRecord(chunkId,rec);
    if(this.currentPage==='syllabus') this.renderSyllabus();
    const L={'all':'PYQ attempted — all left','most':'PYQ attempted — most left','some':'PYQ attempted — some left','little':'PYQ attempted — a little left','done':'PYQ attempted — done ✓'};
    this.toast(L[val]||'Saved');
  },

  saveCQ(chunkId) { const rec=DB.getRecord(chunkId)||SRS.newRecord(); const val=document.getElementById('cq-inp')?.value||''; if(val!==rec.curiousQ){rec.curiousQ=val;DB.setRecord(chunkId,rec);this.toast('Question saved ✓');} },
  saveCQAnswered(chunkId,val) { const rec=DB.getRecord(chunkId)||SRS.newRecord(); rec.curiousAnswered=val; DB.setRecord(chunkId,rec); },
  saveNotes(chunkId) { const rec=DB.getRecord(chunkId)||SRS.newRecord(); const val=document.getElementById('notes-inp')?.value||''; if(val!==rec.notes){rec.notes=val;DB.setRecord(chunkId,rec);this.toast('Notes saved ✓');} },



  // ── PACE ─────────────────────────────────────────────────────────────────────
  renderPace() {
    const year = this.currentYear;
    const pace = Plan.pace(year);
    const stats = Analytics.globalStats();
    const phase = Plan.currentPhase(year);

    // Honest sentence — the one thing this screen should say
    let sentence = '';
    if (stats.total === 0) {
      sentence = 'Add chunks to your syllabus to begin tracking your preparation.';
    } else {
      const covPct = Math.round(stats.studied / stats.total * 100);
      const g3Pct = Math.round(stats.gap3 / stats.total * 100);
      const weakestPaper = PAPER_ORDER.map(p => ({ p, ps: Analytics.paperStats(p) }))
        .filter(x => x.ps.total > 0)
        .sort((a,b) => a.ps.cov - b.ps.cov)[0];
      const wp = weakestPaper ? `Weakest paper: ${PAPERS[weakestPaper.p].label} at ${weakestPaper.ps.cov}% covered.` : '';
      if (pace.status === 'on-track') {
        sentence = `You have seen ${covPct}% of your syllabus and attempted PYQs for ${g3Pct}%. ${pace.buffer} buffer days remain. ${wp}`;
      } else if (pace.status === 'watch') {
        sentence = `${covPct}% of syllabus covered but only ${g3Pct}% PYQ attempted — the gap between reading and practising is where risk lives. ${wp}`;
      } else {
        sentence = `Behind schedule — ${pace.unseen} chunks unseen. At current pace, you need ${Math.ceil(pace.unseen / Math.max(pace.days,1))} chunks/day minimum. ${wp}`;
      }
    }

    // Three-bar pipeline per paper
    let pipeH = '';
    PAPER_ORDER.forEach(paperId => {
      const paper = PAPERS[paperId];
      const ps = Analytics.paperStats(paperId);
      if (ps.total === 0) return;
      const g1w = Math.round(ps.gap1/ps.total*100);
      const g2w = Math.round(ps.gap2/ps.total*100);
      const g3w = Math.round(ps.gap3/ps.total*100);
      pipeH += `
      <div style="margin-bottom:14px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div style="display:flex;align-items:center;gap:6px">
            <div class="nav-dot" style="background:${paper.color}"></div>
            <span style="font-size:12px;font-weight:600;color:var(--text)">${paper.label}</span>
          </div>
          <span class="t-meta">${ps.studied}/${ps.total} chunks · ${fmtMins(ps.totalMins)}</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:10px;color:var(--text3);width:88px;flex-shrink:0">First exposure</span>
            <div class="btrack" style="flex:1;height:7px"><div class="bfill" style="width:${g1w}%;background:${paper.color};height:100%"></div></div>
            <span style="font-size:10px;color:var(--text3);width:28px;text-align:right">${g1w}%</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:10px;color:var(--text3);width:88px;flex-shrink:0">PYQ seen</span>
            <div class="btrack" style="flex:1;height:7px"><div class="bfill" style="width:${g2w}%;background:var(--c-amber);height:100%"></div></div>
            <span style="font-size:10px;color:var(--text3);width:28px;text-align:right">${g2w}%</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:10px;color:var(--text3);width:88px;flex-shrink:0">PYQ attempted</span>
            <div class="btrack" style="flex:1;height:7px"><div class="bfill" style="width:${g3w}%;background:var(--c-green);height:100%"></div></div>
            <span style="font-size:10px;color:var(--text3);width:28px;text-align:right">${g3w}%</span>
          </div>
        </div>
      </div>`;
    });

    // Table with subject expansion
    const pctColor = (p, has) => !has ? 'var(--text3)' : p >= 80 ? 'var(--c-green)' : p >= 50 ? 'var(--c-amber)' : 'var(--c-red)';
    let tableH = `<table class="pace-table">
      <thead><tr>
        <th>Paper</th>
        <th title="Lectures attended">Lectures %</th>
        <th title="First exposure done">First exp. %</th>
        <th title="PYQ seen done">PYQ seen %</th>
        <th title="PYQ attempted done">PYQ att. %</th>
        <th>Chunks</th>
        <th>Time</th>
      </tr></thead><tbody>`;

    PAPER_ORDER.forEach(paperId => {
      const paper = PAPERS[paperId];
      const ps = Analytics.paperStats(paperId);
      const isExp = !!this.expanded[`pace-${paperId}`];
      // Cumulative lectures for this paper
      let lTotal = 0, lDone = 0;
      DB.getSubjects(paperId).forEach(subj => { const ch = DB.getCoaching(paperId, subj.id); lTotal += ch.total || 0; lDone += ch.completed || 0; });
      const lPct = lTotal > 0 ? Math.round(lDone / lTotal * 100) : null;
      const g1 = ps.total ? Math.round(ps.gap1/ps.total*100) : 0;
      const g2 = ps.total ? Math.round(ps.gap2/ps.total*100) : 0;
      const g3 = ps.total ? Math.round(ps.gap3/ps.total*100) : 0;
      tableH += `<tr onclick="UI.togglePacePaper('${paperId}')" class="${isExp?'expanded':''}">
        <td class="paper-name-cell"><div class="nav-dot" style="background:${paper.color}"></div>${paper.label}<span style="font-size:10px;color:var(--text3);margin-left:4px">${isExp?'▴':'▾'}</span></td>
        <td style="color:${pctColor(lPct||0, lTotal>0)}">🎓 ${lPct!==null?lPct+'%':'—'}</td>
        <td style="color:${pctColor(g1, ps.total>0)}">${ps.total?g1+'%':'—'}</td>
        <td style="color:${pctColor(g2, ps.total>0)}">${ps.total?g2+'%':'—'}</td>
        <td style="color:${pctColor(g3, ps.total>0)}">${ps.total?g3+'%':'—'}</td>
        <td>${ps.studied}/${ps.total}</td>
        <td>${fmtMins(ps.totalMins)}</td>
      </tr>`;
      if (isExp) {
        DB.getSubjects(paperId).forEach(subj => {
          const ss = Analytics.subjectStats(paperId, subj.id);
          const ch = DB.getCoaching(paperId, subj.id);
          const slPct = ch.total > 0 ? Math.round(ch.completed/ch.total*100) : null;
          const sg1 = ss.total ? Math.round(ss.gap1/ss.total*100) : 0;
          const sg2 = ss.total ? Math.round(ss.gap2/ss.total*100) : 0;
          const sg3 = ss.total ? Math.round(ss.gap3/ss.total*100) : 0;
          tableH += `<tr class="subj-expand-row">
            <td style="padding-left:24px;color:var(--text2)">↳ ${subj.name}</td>
            <td style="color:${pctColor(slPct||0, ch.total>0)}">🎓 ${slPct!==null?slPct+'%':'—'}</td>
            <td>${ss.total?sg1+'%':'—'}</td>
            <td>${ss.total?sg2+'%':'—'}</td>
            <td>${ss.total?sg3+'%':'—'}</td>
            <td>${ss.studied}/${ss.total}</td>
            <td>${fmtMins(ss.totalMins)}</td>
          </tr>`;
        });
      }
    });
    tableH += '</tbody></table>';

    document.getElementById('c-pace').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="t-page">Pace</div>
      <div class="year-toggle">
        <button class="ytbtn ${year===2027?'active':''}" onclick="UI.setYear(2027)">CSE 2027</button>
        <button class="ytbtn ${year===2028?'active':''}" onclick="UI.setYear(2028)">CSE 2028</button>
      </div>
    </div>

    <!-- Honest sentence -->
    <div style="background:var(--bg2);border:1px solid var(--accent-border);border-radius:var(--radius);padding:14px;margin-bottom:16px">
      <div style="font-size:13px;color:var(--text);line-height:1.6">${sentence}</div>
    </div>

    <!-- Three numbers -->
    <div class="pace-numbers" style="margin-bottom:16px">
      <div class="pnum"><div class="pnum-label">Days to Prelims</div><div class="pnum-val" style="color:var(--accent)">${pace.days}</div><div class="pnum-sub">Prelims ${year}</div></div>
      <div class="pnum"><div class="pnum-label">Status</div><div class="pnum-val" style="font-size:16px;color:var(--${pace.status==='on-track'?'c-green':pace.status==='watch'?'c-amber':'c-red'})">${pace.status.replace('-',' ')}</div><div class="pnum-sub">${pace.msg}</div></div>
      <div class="pnum"><div class="pnum-label">Daily target</div><div class="pnum-val">${pace.target}</div><div class="pnum-sub">chunks/day · ${pace.unseen} unseen</div></div>
    </div>

    <!-- Three-bar pipeline per paper -->
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px">
      <div class="detail-label" style="margin-bottom:14px">Pipeline by paper — the gap between bars is your preparation risk</div>
      ${pipeH ? `<div class="pipe-grid">${pipeH}</div>` : '<div class="t-meta">No chunks added yet</div>'}
      <div style="display:flex;gap:16px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:4px;border-radius:2px;background:var(--accent)"></div><span class="t-meta">First exposure</span></div>
        <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:4px;border-radius:2px;background:var(--c-amber)"></div><span class="t-meta">PYQ seen</span></div>
        <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:4px;border-radius:2px;background:var(--c-green)"></div><span class="t-meta">PYQ attempted</span></div>
      </div>
    </div>

    <!-- Pipeline health summary -->
    <div style="margin-bottom:14px">
      <div class="detail-label" style="margin-bottom:8px">Pipeline health</div>
      <div class="pipeline-row">
        <div class="pipe-item"><div class="pipe-val" style="color:var(--c-green)">${Math.min(stats.gap1,stats.gap2,stats.gap3)}</div><div class="pipe-label">All gaps closed</div></div>
        <div class="pipe-item"><div class="pipe-val" style="color:var(--c-amber)">${Math.max(0,stats.gap1-stats.gap2)}</div><div class="pipe-label">Exposure only</div></div>
        <div class="pipe-item"><div class="pipe-val" style="color:var(--c-red)">${stats.unseen}</div><div class="pipe-label">Untouched</div></div>
        <div class="pipe-item"><div class="pipe-val" style="color:var(--text2)">${fmtMins(stats.totalMins)}</div><div class="pipe-label">Total invested</div></div>
      </div>
    </div>

    <!-- Detailed table -->
    <div class="detail-label" style="margin-bottom:8px">Paper breakdown — click to expand subjects</div>
    ${tableH}`;
  },

  togglePacePaper(paperId) { this.expanded[`pace-${paperId}`]=!this.expanded[`pace-${paperId}`]; this.renderPace(); },
  setYear(year) { this.currentYear=year; DB.settings.targetYear=year; DB.save(); this.updateHeader(); if(this.currentPage==='pace') this.renderPace(); },

  // ── SETTINGS ─────────────────────────────────────────────────────────────────
  renderSettings() {
    const t = DB.settings.dailyTarget || 6;
    const th = DB.settings.theme || 'dark';
    const pa = DB.settings.palette || 'cool';
    document.getElementById('c-settings').innerHTML = `
    <div class="t-page" style="margin-bottom:16px">Settings</div>

    <div class="settings-section">
      <div class="settings-title">Appearance</div>
      <div class="theme-grid">
        <button class="theme-btn ${th==='dark'&&pa==='cool'?'active':''}" onclick="UI.setAppearance('dark','cool')">🌙 Dark · Cool</button>
        <button class="theme-btn ${th==='dark'&&pa==='warm'?'active':''}" onclick="UI.setAppearance('dark','warm')">🌙 Dark · Warm</button>
        <button class="theme-btn ${th==='light'&&pa==='cool'?'active':''}" onclick="UI.setAppearance('light','cool')">☀ Light · Cool</button>
        <button class="theme-btn ${th==='light'&&pa==='warm'?'active':''}" onclick="UI.setAppearance('light','warm')">☀ Light · Warm</button>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-title">Study</div>
      <div style="margin-bottom:12px">
        <div class="setting-label" style="margin-bottom:6px">Daily chunk target: <strong id="td-disp">${t}</strong></div>
        <input type="range" min="3" max="15" step="1" value="${t}" style="width:100%;accent-color:var(--accent)"
          oninput="document.getElementById('td-disp').textContent=this.value"
          onchange="DB.settings.dailyTarget=parseInt(this.value);DB.save();Queue.build(parseInt(this.value));UI.renderToday();">
        <div style="display:flex;justify-content:space-between" class="t-meta"><span>3</span><span>6</span><span>15</span></div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="setting-label">Exam year</div>
        <div class="year-toggle">
          <button class="ytbtn ${this.currentYear===2027?'active':''}" onclick="UI.setYear(2027)">2027</button>
          <button class="ytbtn ${this.currentYear===2028?'active':''}" onclick="UI.setYear(2028)">2028</button>
        </div>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-title">Data</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="UI.exportData()">Export backup</button>
        <label class="btn btn-ghost" style="cursor:pointer">Import backup<input type="file" accept=".json" style="display:none" onchange="UI.importData(event)"></label>
        <button class="btn btn-danger" onclick="UI.resetAll()">Reset all</button>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-title">About</div>
      <div class="t-meta" style="line-height:1.8">
        Myelocus v4 · User-built UPSC syllabus · SM-2 SRS (4-point) · Three-gap pipeline ·
        Chunk-level activity logging · Resizable split pane · 4 theme combinations<br>
        <em>"The locus where myelin forms."</em>
      </div>
    </div>`;
  },

  setAppearance(theme, palette) { DB.settings.theme=theme; DB.settings.palette=palette; DB.save(); this.applyTheme(); this.renderSettings(); },
  exportData() { const b=new Blob([DB.export()],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=`myelocus_backup_${todayStr()}.json`; a.click(); },
  importData(e) { const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=ev=>{ try{DB.import(ev.target.result);this.init();this.toast('Imported ✓');}catch{this.toast('Invalid file');} }; r.readAsText(f); },
  resetAll() { if(!confirm('Reset all progress?')) return; localStorage.removeItem('myelocus_v4'); localStorage.removeItem('myelocus_queue_v4'); DB.load(); Queue.build(6); this.init(); this.toast('Reset ✓'); }
};

// Boot
UI.init();
</script>
</body>
</html>
