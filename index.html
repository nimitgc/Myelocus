<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1117">
<meta name="description" content="Myelocus — Myelocus — where disciplined study builds permanent neural pathways">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Myelocus">
<title>Myelocus — UPSC Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<style>
:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --bg3: #22263a;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f0f0;
  --text2: #9ca3af;
  --text3: #5a6070;
  --accent: #6366f1;
  --accent2: #818cf8;
  --accent-bg: rgba(99,102,241,0.12);
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.12);
  --amber: #f59e0b;
  --amber-bg: rgba(245,158,11,0.12);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.12);
  --blue: #3b82f6;
  --blue-bg: rgba(59,130,246,0.12);
  --radius: 10px;
  --radius-lg: 14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100%;line-height:1.5;font-size:15px}

/* Layout */
.app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:80px}
.header{padding:20px 20px 0;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:16px}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff}
.logo-text{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.logo-sub{font-size:11px;color:var(--text3);margin-top:1px}
.header-actions{display:flex;gap:8px}
.icon-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:18px;transition:all 0.15s}
.icon-btn:hover{background:var(--bg2);color:var(--text)}

/* Nav tabs */
.nav-tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;padding-bottom:0}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{background:none;border:none;border-bottom:2px solid transparent;padding:10px 14px;font-size:13px;color:var(--text3);cursor:pointer;white-space:nowrap;transition:all 0.15s;font-weight:500}
.nav-tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.nav-tab:hover{color:var(--text2)}

/* Pages */
.page{display:none;padding:20px}
.page.active{display:block}

/* Metric cards */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.metric-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.metric-val{font-size:26px;font-weight:700;color:var(--text)}
.metric-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* Paper cards */
.paper-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:12px;overflow:hidden;cursor:pointer;transition:border-color 0.15s}
.paper-card:hover{border-color:var(--border2)}
.paper-head{padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.paper-info{flex:1}
.paper-title{font-size:14px;font-weight:600;color:var(--text)}
.paper-sub{font-size:12px;color:var(--text3);margin-top:2px}
.paper-pct{font-size:20px;font-weight:700}
.prog-bar{height:3px;background:var(--bg3)}
.prog-fill{height:3px;transition:width 0.5s ease}

/* Section & topic list */
.section-block{margin-bottom:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.section-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3)}
.section-title{font-size:13px;font-weight:600;color:var(--text)}
.section-count{font-size:12px;color:var(--text3)}
.topic-row{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:background 0.1s;border-bottom:1px solid var(--border)}
.topic-row:last-child{border-bottom:none}
.topic-row:hover{background:var(--bg3)}
.status-ring{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.status-ring.started{border-color:var(--blue);background:var(--blue-bg)}
.status-ring.done{border-color:var(--green);background:var(--green-bg)}
.status-ring.revision{border-color:var(--amber);background:var(--amber-bg)}
.status-ring.done::after{content:'✓';font-size:10px;color:var(--green);font-weight:700}
.status-ring.started::after{content:'';width:6px;height:6px;border-radius:50%;background:var(--blue)}
.status-ring.revision::after{content:'!';font-size:10px;color:var(--amber);font-weight:700}
.topic-info{flex:1;min-width:0}
.topic-name{font-size:13px;color:var(--text);line-height:1.4}
.topic-meta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 7px;border-radius:999px;font-weight:500}
.tag-due{background:var(--red-bg);color:var(--red)}
.tag-soon{background:var(--amber-bg);color:var(--amber)}
.tag-ok{background:var(--green-bg);color:var(--green)}
.tag-score{background:var(--blue-bg);color:var(--blue)}
.edit-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px;border-radius:6px;transition:all 0.15s;flex-shrink:0}
.edit-btn:hover{color:var(--text);background:var(--bg3)}

/* Detail drawer */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:none;align-items:flex-end}
.drawer-overlay.open{display:flex}
.drawer{background:var(--bg2);border-radius:var(--radius-lg) var(--radius-lg) 0 0;width:100%;max-width:480px;margin:0 auto;padding:20px;max-height:85vh;overflow-y:auto}
.drawer-handle{width:36px;height:4px;background:var(--bg3);border-radius:999px;margin:0 auto 16px}
.drawer-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:16px;line-height:1.4}
.status-btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.status-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px;font-size:13px;color:var(--text2);cursor:pointer;text-align:center;transition:all 0.15s;font-weight:500}
.status-btn:hover{border-color:var(--border2);color:var(--text)}
.status-btn.active-pending{border-color:var(--border2);background:var(--bg3);color:var(--text)}
.status-btn.active-started{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}
.status-btn.active-done{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.status-btn.active-revision{border-color:var(--amber);background:var(--amber-bg);color:var(--amber)}
.field-label{font-size:12px;color:var(--text3);margin-bottom:6px;margin-top:14px}
.field-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;font-size:14px;color:var(--text);outline:none;transition:border-color 0.15s;font-family:inherit}
.field-input:focus{border-color:var(--accent)}
textarea.field-input{resize:vertical;min-height:80px;line-height:1.5}
.drawer-actions{display:flex;gap:8px;margin-top:16px}
.btn{padding:10px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--border2)}
.btn-ai{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;flex:1}
.btn-ai:hover{opacity:0.9}

/* AI Panel */
.ai-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:16px;overflow:hidden}
.ai-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ai-title{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.ai-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.ai-key-row{padding:14px 16px;display:flex;gap:8px}
.ai-key-row input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-size:13px;color:var(--text);outline:none;font-family:monospace}
.ai-key-row input:focus{border-color:var(--accent)}
.ai-output{padding:16px;font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-wrap;min-height:60px}
.ai-output .q-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:10px;font-size:13px;color:var(--text);line-height:1.6}
.ai-output .q-num{font-size:11px;color:var(--accent2);font-weight:600;margin-bottom:4px}
.ai-output .q-hint{font-size:11px;color:var(--text3);margin-top:6px;font-style:italic}
.ai-controls{padding:0 16px 16px;display:flex;gap:8px;flex-wrap:wrap}
.ai-type-btn{background:var(--bg3);border:1px solid var(--border);border-radius:999px;padding:6px 12px;font-size:12px;color:var(--text2);cursor:pointer;transition:all 0.15s}
.ai-type-btn.active{border-color:var(--accent);color:var(--accent2);background:var(--accent-bg)}
.ai-type-btn:hover{color:var(--text)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Heatmap */
.heatmap-wrap{margin-bottom:20px}
.heatmap-title{font-size:12px;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em}
.heatmap{display:grid;grid-template-columns:repeat(13,1fr);gap:3px}
.hm-cell{aspect-ratio:1;border-radius:3px;background:var(--bg3)}
.hm-cell.l1{background:rgba(99,102,241,0.3)}
.hm-cell.l2{background:rgba(99,102,241,0.6)}
.hm-cell.l3{background:#6366f1}
.hm-legend{display:flex;align-items:center;gap:4px;margin-top:8px;font-size:11px;color:var(--text3)}
.hm-legend-cell{width:10px;height:10px;border-radius:2px}

/* Settings */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.setting-label{font-size:14px;color:var(--text)}
.setting-sub{font-size:12px;color:var(--text3);margin-top:2px}
.toggle{width:44px;height:24px;background:var(--bg3);border:1px solid var(--border2);border-radius:999px;cursor:pointer;position:relative;transition:background 0.2s}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform 0.2s}
.toggle.on::after{transform:translateX(20px)}
.danger-btn{background:var(--red-bg);border:1px solid var(--red);color:var(--red);border-radius:var(--radius);padding:10px 16px;font-size:13px;cursor:pointer;font-weight:600;margin-top:16px}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:8px 0 12px;z-index:20}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:var(--text3);transition:color 0.15s;background:none;border:none;font-family:inherit}
.bnav-item.active{color:var(--accent2)}
.bnav-icon{font-size:20px}
.bnav-label{font-size:10px;font-weight:500}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:10px 20px;border-radius:999px;font-size:13px;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* Welcome banner */
.welcome{background:var(--accent-bg);border:1px solid rgba(99,102,241,0.25);border-radius:var(--radius-lg);padding:16px;margin-bottom:20px}
.welcome-quote{font-size:13px;color:var(--accent2);font-style:italic;line-height:1.6;margin-bottom:8px}
.welcome-date{font-size:12px;color:var(--text3)}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.empty-icon{font-size:36px;margin-bottom:12px}

/* Back button */
.back-btn{display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px;margin-bottom:16px;padding:4px 0;font-family:inherit}
.back-btn:hover{color:var(--text)}

@media(prefers-color-scheme:light){
  :root{
    --bg:#f8f9fc;--bg2:#ffffff;--bg3:#f1f3f8;
    --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
    --text:#111827;--text2:#4b5563;--text3:#9ca3af;
  }
}
</style>
</head>

let aiType = 'mains';

function loadDB(){
  try{ db = JSON.parse(localStorage.getItem('myelocus_db')||'{}'); }catch(e){ db={}; }
}
function saveDB(){
  localStorage.setItem('myelocus_db', JSON.stringify(db));
  showToast('Saved');
}
function key(p,si,ti){ return p+'_'+si+'_'+ti; }
function getEntry(p,si,ti){ return db[key(p,si,ti)]||{}; }
function getStatus(p,si,ti){ return getEntry(p,si,ti).status||'pending'; }
function setStatus(p,si,ti,s){
  const k=key(p,si,ti);
  if(!db[k]) db[k]={};
  db[k].status=s;
  if(s==='done'||s==='revision') db[k].revised=todayStr();
  saveDB();
}
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function daysSince(d){ return d?Math.floor((Date.now()-new Date(d))/(86400000)):999; }

function getPaperStats(p){
  let total=0,done=0,started=0,rev=0,overdue=0;
  SYLLABUS[p].sections.forEach((s,si)=>s.topics.forEach((_,ti)=>{
    total++;
    const st=getStatus(p,si,ti);
    if(st==='done'){done++;if(daysSince(getEntry(p,si,ti).revised)>14)overdue++;}
    else if(st==='started')started++;
    else if(st==='revision')rev++;
  }));
  return{total,done,started,rev,overdue,pct:total?Math.round(done/total*100):0};
}

function getAllStats(){
  let t=0,d=0,s=0,r=0,ov=0;
  Object.keys(SYLLABUS).forEach(p=>{const st=getPaperStats(p);t+=st.total;d+=st.done;s+=st.started;r+=st.rev;ov+=st.overdue;});
  return{total:t,done:d,started:s,revision:r,overdue:ov,pct:t?Math.round(d/t*100):0};
}

function getRevisionTag(p,si,ti){
  const e=getEntry(p,si,ti);
  if(e.status!=='done'&&e.status!=='revision') return '';
  const d=daysSince(e.revised);
  if(d>14) return '<span class="tag tag-due">Revise now</span>';
  if(d>7) return '<span class="tag tag-soon">Revise soon</span>';
  return '<span class="tag tag-ok">Revised</span>';
}

function renderHome(){
  const all = getAllStats();
  const today = new Date();
  const quote = QUOTES[today.getDate()%QUOTES.length];

  let recentTopics = [];
  Object.keys(SYLLABUS).forEach(p=>{
    SYLLABUS[p].sections.forEach((s,si)=>s.topics.forEach((t,ti)=>{
      const e=getEntry(p,si,ti);
      if(e.revised) recentTopics.push({p,si,ti,topic:t,revised:e.revised,status:e.status,paper:SYLLABUS[p].label});
    }));
  });
  recentTopics.sort((a,b)=>b.revised.localeCompare(a.revised));
  const recent = recentTopics.slice(0,5);

  let revDue = recentTopics.filter(t=>daysSince(t.revised)>14&&t.status==='done');

  let html = `
  <div class="welcome">
    <div class="welcome-quote">"${quote}"</div>
    <div class="welcome-date">${today.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Overall coverage</div>
      <div class="metric-val" style="color:var(--accent)">${all.pct}%</div>
      <div class="metric-sub">${all.done} of ${all.total} topics</div>
    </div>
    <div class="metric">
      <div class="metric-label">Revision due</div>
      <div class="metric-val" style="color:var(--red)">${all.overdue}</div>
      <div class="metric-sub">topics overdue</div>
    </div>
    <div class="metric">
      <div class="metric-label">In progress</div>
      <div class="metric-val" style="color:var(--blue)">${all.started}</div>
      <div class="metric-sub">topics started</div>
    </div>
    <div class="metric">
      <div class="metric-label">Remaining</div>
      <div class="metric-val">${all.total-all.done}</div>
      <div class="metric-sub">topics pending</div>
    </div>
  </div>`;

  html += `<div style="margin-bottom:20px">`;
  Object.keys(SYLLABUS).forEach(p=>{
    const s=getPaperStats(p);
    const info=SYLLABUS[p];
    html+=`<div class="paper-card" onclick="showPaper('${p}')">
      <div class="paper-head">
        <div class="paper-info">
          <div class="paper-title">${info.label}</div>
          <div class="paper-sub">${info.sub} · ${s.done}/${s.total} done</div>
        </div>
        <span class="paper-pct" style="color:${info.color}">${s.pct}%</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${s.pct}%;background:${info.color}"></div></div>
    </div>`;
  });
  html+=`</div>`;

  if(revDue.length>0){
    html+=`<div style="margin-bottom:8px;font-size:12px;color:var(--red);text-transform:uppercase;letter-spacing:0.05em;font-weight:600">⚠ Revision overdue</div>`;
    revDue.slice(0,4).forEach(t=>{
      html+=`<div class="topic-row" style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px" onclick="openDrawer('${t.p}',${t.si},${t.ti})">
        <div class="status-ring done"></div>
        <div class="topic-info"><div class="topic-name">${t.topic}</div><div class="topic-meta">${t.paper} · Last revised ${daysSince(t.revised)}d ago</div></div>
        <span class="tag tag-due">Overdue</span>
      </div>`;
    });
  }

  document.getElementById('page-home').innerHTML = html;
}

function renderPaper(p){
  const info = SYLLABUS[p];
  const stats = getPaperStats(p);
  let html = `
  <button class="back-btn" onclick="showPage('home')">← Home</button>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div>
      <div style="font-size:18px;font-weight:700;color:var(--text)">${info.label}</div>
      <div style="font-size:13px;color:var(--text3)">${info.sub}</div>
    </div>
    <span style="font-size:24px;font-weight:700;color:${info.color}">${stats.pct}%</span>
  </div>
  <div class="metrics" style="margin-bottom:20px">
    <div class="metric"><div class="metric-label">Done</div><div class="metric-val" style="color:var(--green)">${stats.done}</div></div>
    <div class="metric"><div class="metric-label">Started</div><div class="metric-val" style="color:var(--blue)">${stats.started}</div></div>
    <div class="metric"><div class="metric-label">Revision</div><div class="metric-val" style="color:var(--amber)">${stats.rev}</div></div>
    <div class="metric"><div class="metric-label">Pending</div><div class="metric-val">${stats.total-stats.done-stats.started-stats.rev}</div></div>
  </div>
  <div style="font-size:11px;color:var(--text3);margin-bottom:12px">Tap topic to cycle status · Tap ✎ to add notes & score</div>`;

  info.sections.forEach((sec,si)=>{
    const secDone=sec.topics.filter((_,ti)=>getStatus(p,si,ti)==='done').length;
    html+=`<div class="section-block">
      <div class="section-head">
        <span class="section-title">${sec.name}</span>
        <span class="section-count">${secDone}/${sec.topics.length}</span>
      </div>`;
    sec.topics.forEach((topic,ti)=>{
      const st=getStatus(p,si,ti);
      const e=getEntry(p,si,ti);
      const revTag=getRevisionTag(p,si,ti);
      const scoreTag=e.score?`<span class="tag tag-score">${e.score}%</span>`:'';
      html+=`<div class="topic-row" onclick="cycleStatus('${p}',${si},${ti})">
        <div class="status-ring ${st}"></div>
        <div class="topic-info">
          <div class="topic-name">${topic}</div>
          <div class="topic-meta">${revTag}${scoreTag}</div>
        </div>
        <button class="edit-btn" onclick="event.stopPropagation();openDrawer('${p}',${si},${ti})" title="Edit">✎</button>
      </div>`;
    });
    html+=`</div>`;
  });

  document.getElementById('page-paper').innerHTML = html;
}

function cycleStatus(p,si,ti){
  const order=['pending','started','done','revision'];
  const cur=getStatus(p,si,ti);
  const next=order[(order.indexOf(cur)+1)%order.length];
  setStatus(p,si,ti,next);
  renderPaper(p);
  if(activePageId==='home') renderHome();
}

function openDrawer(p,si,ti){
  const topic=SYLLABUS[p].sections[si].topics[ti];
  const e=getEntry(p,si,ti)||{};
  const st=e.status||'pending';
  const statuses=['pending','started','done','revision'];
  const statusLabels={pending:'Not started',started:'In progress',done:'Completed',revision:'Needs revision'};

  document.getElementById('drawer-content').innerHTML=`
    <div class="drawer-title">${topic}</div>
    <div class="status-btns">
      ${statuses.map(s=>`<button class="status-btn ${st===s?'active-'+s:''}" onclick="setStatusDrawer('${p}',${si},${ti},'${s}')">${statusLabels[s]}</button>`).join('')}
    </div>
    <div class="field-label">Mock test score (%)</div>
    <input class="field-input" type="number" id="d-score" min="0" max="100" value="${e.score||''}" placeholder="Leave blank if not tested">
    <div class="field-label">Notes & key points</div>
    <textarea class="field-input" id="d-notes" placeholder="Sources read, important facts, questions to remember...">${e.notes||''}</textarea>
    <div class="drawer-actions">
      <button class="btn btn-primary" onclick="saveDrawer('${p}',${si},${ti})">Save</button>
      <button class="btn btn-ghost" onclick="closeDrawer()">Cancel</button>
      <button class="btn btn-ai" onclick="aiForTopic('${p}',${si},${ti},'${topic.replace(/'/g,"\\'")}')">AI Questions ✦</button>
    </div>
    ${e.revised?`<div style="font-size:11px;color:var(--text3);margin-top:12px">Last revised: ${e.revised}</div>`:''}
  `;
  document.getElementById('drawer-overlay').classList.add('open');
  activeDrawer={p,si,ti};
}

function setStatusDrawer(p,si,ti,s){
  setStatus(p,si,ti,s);
  openDrawer(p,si,ti);
  if(activePageId==='paper') renderPaper(currentPaper);
  if(activePageId==='home') renderHome();
}

function saveDrawer(p,si,ti){
  const k=key(p,si,ti);
  if(!db[k]) db[k]={};
  db[k].score=document.getElementById('d-score').value;
  db[k].notes=document.getElementById('d-notes').value;
  saveDB();
  closeDrawer();
  if(activePageId==='paper') renderPaper(currentPaper);
  if(activePageId==='home') renderHome();
}

function closeDrawer(e){
  if(e&&e.target!==document.getElementById('drawer-overlay')) return;
  document.getElementById('drawer-overlay').classList.remove('open');
}

function aiForTopic(p,si,ti,topic){
  closeDrawer();
  showPage('ai');
  document.getElementById('ai-topic-input').value=topic;
  generateAI(topic);
}

function toggleKeyVis(){
  const s=document.getElementById('key-section');
  s.style.display=s.style.display==='none'?'':'none';
}
function saveKey(){
  const v=document.getElementById('api-key-input').value.trim();
  localStorage.setItem('myelocus_apikey',v);
  renderAI();
  showToast('API key saved');
}
function setAiType(t){
  aiType=t;
  renderAI();
}

async function generateAI(topicOverride){
  const topic=topicOverride||(document.getElementById('ai-topic-input')||{value:''}).value.trim();
  if(!topic){showToast('Enter a topic first');return;}
  const apiKey=localStorage.getItem('myelocus_apikey')||'';
  const out=document.getElementById('ai-output');
  out.style.display='block';

  if(!apiKey||apiKey.length<20){
    out.innerHTML=`<div style="color:var(--text3);padding:8px 0">
      <div style="margin-bottom:8px">⚠ Add your Anthropic API key above to use AI features.</div>
      <div style="font-size:11px">Get one free at <a href="https://console.anthropic.com" style="color:var(--accent2)">console.anthropic.com</a></div>
    </div>`;
    return;
  }

  const prompts={
    mains:`You are a UPSC Mains examiner. Generate 3 high-quality GS Mains questions on "${topic}" for UPSC Civil Services examination. For each question: write the question (250 words format), then a one-line "Examiner's hint" on what the ideal answer should cover. Format clearly as Q1, Q2, Q3.`,
    prelims:`Generate 5 UPSC Prelims-style MCQ questions on "${topic}". For each: question, 4 options (a-d), correct answer, and a one-line explanation. Make them challenging, matching actual UPSC difficulty.`,
    explain:`Explain "${topic}" for UPSC Civil Services preparation in a crisp, structured way. Cover: (1) Core concept in 2 sentences, (2) Key facts/data points an examiner would expect, (3) Current affairs relevance, (4) Likely exam angle. Keep it under 300 words.`,
    current:`List 5 recent developments (2024-2025) related to "${topic}" that could appear in UPSC. For each: the development, which GS paper it belongs to, and a one-line angle for an answer.`
  };

  out.innerHTML=`<span class="spinner"></span>Generating...`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1200,messages:[{role:'user',content:prompts[aiType]}]})
    });
    const data=await res.json();
    if(data.error){out.innerHTML=`<span style="color:var(--red)">Error: ${data.error.message}</span>`;return;}
    const text=data.content[0].text;
    out.innerHTML=formatAIOutput(text);
  }catch(e){
    out.innerHTML=`<span style="color:var(--red)">Connection error. Check your API key and internet connection.</span>`;
  }
}

function formatAIOutput(text){
  const lines=text.split('\n').filter(l=>l.trim());
  let html='';
  let inBlock=false;
  let blockContent='';
  lines.forEach(line=>{
    if(/^(Q\d|##|\*\*Q)/.test(line.trim())){
      if(inBlock){html+=`<div class="q-item">${blockContent}</div>`;blockContent='';}
      inBlock=true;
      blockContent=`<div class="q-num">${line.replace(/\*\*/g,'')}</div>`;
    } else if(inBlock){
      blockContent+=`<div style="margin-top:4px">${line.replace(/\*\*/g,'<strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>')}</div>`;
    } else {
      html+=`<div style="margin-bottom:8px">${line}</div>`;
    }
  });
  if(inBlock) html+=`<div class="q-item">${blockContent}</div>`;
  return html||`<div>${text}</div>`;
}

  const apiKey=localStorage.getItem('myelocus_apikey')||'';
  const all=getAllStats();

  <div class="setting-row">
    <div><div class="setting-label">App name</div><div class="setting-sub">Myelocus — UPSC Tracker</div></div>
  </div>
  <div class="setting-row">
    <div><div class="setting-label">Topics tracked</div><div class="setting-sub">${all.done} of ${all.total} completed</div></div>
  </div>
  <div class="setting-row">
    <div><div class="setting-label">API key status</div><div class="setting-sub">${apiKey.length>10?'Configured ✓':'Not set'}</div></div>
    <button class="btn btn-ghost" style="font-size:12px;padding:6px 12px" onclick="showPage('ai')">Manage</button>
  </div>
  <div class="setting-row">

}

function exportData(){
  const blob=new Blob([JSON.stringify({db,exported:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='myelocus_backup.json';a.click();
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.db){db=d.db;saveDB();renderHome();showToast('Imported successfully');}}catch(err){showToast('Invalid file');}};
  r.readAsText(file);
}
function resetAll(){
  if(!confirm('This will delete all your progress. Are you sure?'))return;
  db={};localStorage.removeItem('myelocus_db');renderHome();showToast('Progress reset');
}

function showPage(id){
  ['home','paper','ai','settings'].forEach(p=>{
    document.getElementById('page-'+p).classList.remove('active');
    const bn=document.getElementById('bnav-'+p);
    if(bn) bn.classList.remove('active');
  });
  document.getElementById('page-'+id).classList.add('active');
  const bn=document.getElementById('bnav-'+id);
  if(bn) bn.classList.add('active');
  activePageId=id;
  if(id==='home') renderHome();
  if(id==='ai') renderAI();
  if(id==='settings') renderSettings();
}

function showPaper(p){
  currentPaper=p;
  ['home','paper','ai','settings'].forEach(pp=>{
    document.getElementById('page-'+pp).classList.remove('active');
    const bn=document.getElementById('bnav-'+pp);
    if(bn) bn.classList.remove('active');
  });
  document.getElementById('page-paper').classList.add('active');
  const bn=document.getElementById('bnav-'+p);
  if(bn) bn.classList.add('active');
  activePageId='paper';
  renderPaper(p);
  document.getElementById('more-overlay').classList.remove('open');
}

function showMoreMenu(){
  document.getElementById('more-overlay').classList.add('open');
}
function closeMore(e){
  if(e&&e.target!==document.getElementById('more-overlay'))return;
  document.getElementById('more-overlay').classList.remove('open');
}
function closeMoreAndGo(p){
  document.getElementById('more-overlay').classList.remove('open');
  if(p==='ai') showPage('ai');
  else showPaper(p);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

loadDB();
renderHome();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
