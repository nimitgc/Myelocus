<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Myelocus">
<title>Myelocus</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <div class="logo-mark">M</div>
      <div>
        <div class="logo-text">Myelocus</div>
        <div class="logo-sub">Build your neural edge</div>
      </div>
    </div>
    <div class="hdr-center">
      <div class="chip" id="countdown-chip">
        <div class="pace-dot" id="pace-dot"></div>
        <span id="countdown-text">—</span>
      </div>
    </div>
    <div class="hdr-right">
      <div class="streak" id="streak-chip">🔥 0 days</div>
      <button class="icon-btn" onclick="UI.toggleTheme()" id="theme-btn" title="Toggle theme">☀</button>
      <button class="icon-btn" onclick="UI.show('onboard')" title="Bulk onboard">⊕</button>
      <button class="icon-btn" onclick="UI.show('settings')" title="Settings">⚙</button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="nav-label">Study</div>
    <button class="nav-item active" id="nav-today" onclick="UI.show('today')">
      <span>⊙</span> Today's queue
      <span class="nav-pct" id="nav-due-count"></span>
    </button>

    <div class="nav-label">Syllabus</div>
    <button class="nav-item" id="nav-gs1" onclick="UI.showPaper('gs1')">
      <span class="nav-dot" style="background:#6366f1"></span> GS 1
      <span class="nav-pct" id="np-gs1">0%</span>
    </button>
    <button class="nav-item" id="nav-gs2" onclick="UI.showPaper('gs2')">
      <span class="nav-dot" style="background:#22c55e"></span> GS 2
      <span class="nav-pct" id="np-gs2">0%</span>
    </button>
    <button class="nav-item" id="nav-gs3" onclick="UI.showPaper('gs3')">
      <span class="nav-dot" style="background:#f59e0b"></span> GS 3
      <span class="nav-pct" id="np-gs3">0%</span>
    </button>
    <button class="nav-item" id="nav-gs4" onclick="UI.showPaper('gs4')">
      <span class="nav-dot" style="background:#a78bfa"></span> GS 4
      <span class="nav-pct" id="np-gs4">0%</span>
    </button>
    <button class="nav-item" id="nav-prelims" onclick="UI.showPaper('prelims')">
      <span class="nav-dot" style="background:#f43f5e"></span> Prelims
      <span class="nav-pct" id="np-prelims">0%</span>
    </button>
    <button class="nav-item" id="nav-optional" onclick="UI.showPaper('optional')">
      <span class="nav-dot" style="background:#06b6d4"></span> Optional
      <span class="nav-pct" id="np-optional">0%</span>
    </button>

    <div class="nav-label">Insights</div>
    <button class="nav-item" id="nav-gaps" onclick="UI.show('gaps')">
      <span>◈</span> Gap analysis
    </button>
    <button class="nav-item" id="nav-plan" onclick="UI.show('plan')">
      <span>⊞</span> Battle plan
    </button>
    <button class="nav-item" id="nav-stats" onclick="UI.show('stats')">
      <span>◎</span> Stats
    </button>
  </nav>

  <!-- MAIN -->
  <main class="main" id="main">
    <div class="page active" id="page-today"><div id="today-content"></div></div>
    <div class="page" id="page-syllabus"><div id="syllabus-content"></div></div>
    <div class="page" id="page-gaps"><div id="gaps-content"></div></div>
    <div class="page" id="page-plan"><div id="plan-content"></div></div>
    <div class="page" id="page-stats"><div id="stats-content"></div></div>
    <div class="page" id="page-onboard"><div id="onboard-content"></div></div>
    <div class="page" id="page-settings"><div id="settings-content"></div></div>
  </main>
</div>

<!-- Mobile nav -->
<nav class="bnav">
  <button class="bnav-item active" id="bnav-today" onclick="UI.show('today')"><span class="bnav-icon">⊙</span><span>Today</span></button>
  <button class="bnav-item" id="bnav-syllabus" onclick="UI.showPaper('gs1')"><span class="bnav-icon">⊞</span><span>Syllabus</span></button>
  <button class="bnav-item" id="bnav-gaps" onclick="UI.show('gaps')"><span class="bnav-icon">◈</span><span>Gaps</span></button>
  <button class="bnav-item" id="bnav-plan" onclick="UI.show('plan')"><span class="bnav-icon">◎</span><span>Plan</span></button>
  <button class="bnav-item" id="bnav-onboard" onclick="UI.show('onboard')"><span class="bnav-icon">⊕</span><span>Onboard</span></button>
</nav>

<!-- Topic drawer -->
<div class="overlay" id="drawer-overlay" onclick="UI.closeDrawer(event)">
  <div class="drawer" id="drawer">
    <button class="drawer-close" onclick="UI.closeDrawer()">✕</button>
    <div id="drawer-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="syllabus.js"></script>
<script src="app.js"></script>
<script>

// ─── UI CONTROLLER ────────────────────────────────────────────────────────────
const UI = {
  currentPage: 'today',
  currentPaper: 'gs1',
  currentYear: 2027,
  queue: [],
  queueIdx: 0,
  doneToday: 0,

  init() {
    DB.load();
    Additions.load();
    this.currentYear = DB.settings.targetYear || 2027;
    const theme = DB.settings.theme || 'dark';
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('theme-btn').textContent = theme === 'dark' ? '☀' : '☾';
    this.restoreOrBuildQueue();
    this.initCardStates();
    this.updateHeader();
    this.updateNavPcts();
    this.renderToday();
  },

  restoreOrBuildQueue() {
    const today = todayStr();
    if (DB.savedQueue && DB.savedQueueDate === today && DB.savedQueue.length > 0) {
      this.queue = DB.savedQueue;
      this.queueIdx = DB.savedQueueIndex || 0;
      this.doneToday = this.queueIdx;
    } else {
      this.buildQueue();
    }
  },

  buildQueue() {
    const target = DB.settings.dailyTarget || 6;
    this.queue = Queue.build(target);
    this.queueIdx = 0;
    this.doneToday = 0;
    DB.saveQueueState(this.queue, 0);
  },

  updateHeader() {
    const year = this.currentYear;
    const pace = Plan.pace(year);
    const streak = DB.settings.streak || 0;
    document.getElementById('countdown-text').innerHTML =
      `<strong>${Plan.daysToExam(year)}</strong> days to Prelims ${year}`;
    document.getElementById('pace-dot').className = `pace-dot ${pace.status}`;
    document.getElementById('streak-chip').textContent = `🔥 ${streak} day${streak !== 1 ? 's' : ''}`;
    const due = Queue.stats().due;
    document.getElementById('nav-due-count').textContent = due > 0 ? due : '';
  },

  updateNavPcts() {
    PAPER_ORDER.forEach(p => {
      const el = document.getElementById(`np-${p}`);
      if (el) el.textContent = Analytics.paperCoverage(p) + '%';
    });
  },

  show(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item, .bnav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`page-${page}`)?.classList.add('active');
    document.getElementById(`nav-${page}`)?.classList.add('active');
    document.getElementById(`bnav-${page}`)?.classList.add('active');
    this.currentPage = page;
    document.getElementById('main').scrollTop = 0;
    if (page === 'today') this.renderToday();
    else if (page === 'gaps') this.renderGaps();
    else if (page === 'plan') this.renderPlan();
    else if (page === 'stats') this.renderStats();
    else if (page === 'onboard') this.renderOnboard();
    else if (page === 'settings') this.renderSettings();
  },

  showPaper(paper) {
    this.currentPaper = paper;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item, .bnav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page-syllabus')?.classList.add('active');
    document.getElementById(`nav-${paper}`)?.classList.add('active');
    document.getElementById('bnav-syllabus')?.classList.add('active');
    this.currentPage = 'syllabus';
    document.getElementById('main').scrollTop = 0;
    this.renderSyllabus();
  },

  toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    document.getElementById('theme-btn').textContent = next === 'dark' ? '☀' : '☾';
    DB.settings.theme = next;
    DB.save();
  },

  toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  },

  // ─── TODAY ──────────────────────────────────────────────────────────────────
  renderToday() {
    const target = DB.settings.dailyTarget || 6;
    const total = this.queue.length;
    const done = this.queue.filter((_, i) => this.cardStates[i] && this.cardStates[i].done).length;
    const allDone = done >= total && total > 0;
    const pct = total > 0 ? Math.round(done / total * 100) : 0;
    const circ = 2 * Math.PI * 18;
    const offset = circ - (pct / 100) * circ;
    const phase = Plan.current(this.currentYear);
    const pace = Plan.pace(this.currentYear);
    const weekDone = Plan.weekDone();
    const weekTarget = phase?.weekly || 6;
    const stats = Queue.stats();

    let qHTML = '';
    if (total === 0) {
      qHTML = `<div style="text-align:center;padding:40px 20px;color:var(--text3)">
        <div style="font-size:32px;margin-bottom:12px">◎</div>
        <div style="font-size:15px;font-weight:600;margin-bottom:6px">No topics due today</div>
        <div style="font-size:13px">SRS schedule is clear. Study something new from the Syllabus map.</div>
      </div>`;
    } else {
      if (allDone) {
        const streak = DB.settings.streak || 0;
        qHTML += `<div class="done-screen show" style="margin-bottom:16px">
          <div class="done-icon">◎</div>
          <div class="done-title">Session complete</div>
          <div class="done-sub">All ${done} topics done. The pathways strengthen.</div>
          <div class="done-stats">
            <div class="ds"><div class="ds-val" style="color:var(--accent)">${done}</div><div class="ds-lbl">Today</div></div>
            <div class="ds"><div class="ds-val" style="color:var(--amber)">🔥 ${streak}</div><div class="ds-lbl">Streak</div></div>
            <div class="ds"><div class="ds-val" style="color:var(--green)">${stats.strong}</div><div class="ds-lbl">Strong</div></div>
          </div>
          <button class="btn btn-ghost" onclick="UI.buildQueue();UI.initCardStates();UI.renderToday();">Load more topics</button>
        </div>`;
      }

      this.queue.forEach((item, idx) => {
        const state = this.cardStates[idx] || { done: false, score: null, expanded: false };
        const isDone = state.done;
        const isNew = SRS.isNew(item.rec);
        const info = SYLLABUS[item.paper];
        const scoreLabels = ['', 'Again', 'Hard', 'Good', 'Easy'];
        const scoreColors = ['', 'var(--red)', 'var(--amber)', 'var(--blue)', 'var(--green)'];

        // Card border color: done = green, active/expanded = accent, default = border
        const borderStyle = isDone
          ? 'border-color:var(--green)'
          : state.expanded ? 'border-color:var(--accent)' : '';

        qHTML += `
        <div class="qcard" style="${borderStyle}" id="qcard-${idx}">
          <div class="qcard-head" onclick="UI.toggleCard(${idx})" style="cursor:pointer">
            <div class="qnum" style="${isDone ? 'background:var(--green-bg);color:var(--green)' : state.expanded ? 'background:var(--accent-bg);color:var(--accent2)' : ''}">${isDone ? '✓' : idx + 1}</div>
            <div class="qtopic">${item.topic}</div>
            <span class="qpaper" style="background:${info.color}20;color:${info.color}">${info.label}</span>
            ${isDone && state.score
              ? `<span style="font-size:11px;font-weight:600;color:${scoreColors[state.score]}">${scoreLabels[state.score]}</span>`
              : `<span class="qtype">${isNew ? 'New' : 'Review'}</span>`}
            <span style="color:var(--text3);font-size:14px;margin-left:4px">${state.expanded ? '▴' : '▾'}</span>
          </div>

          ${state.expanded ? `
          <div style="padding:0 14px 14px;border-top:1px solid var(--border)">
            ${isNew && !isDone ? `
              <div style="font-size:12px;color:var(--text2);padding:10px 0 12px;line-height:1.6">
                Study this topic, then mark it done below.
              </div>
              <button class="mark-studied-btn" onclick="UI.markStudied(${idx})">
                ✓ Done — I have studied this
              </button>` : ''}

            ${!isNew || isDone ? `
              <div style="font-size:12px;color:var(--text3);margin:10px 0 8px">${isDone ? 'Change rating:' : 'How well did you recall this?'}</div>
              <div class="rate-btns">
                <button class="rate-btn again ${state.score===1?'selected':''}" onclick="UI.rateCard(${idx},1)">Again<span>Blank</span></button>
                <button class="rate-btn hard ${state.score===2?'selected':''}" onclick="UI.rateCard(${idx},2)">Hard<span>Gaps</span></button>
                <button class="rate-btn good ${state.score===3?'selected':''}" onclick="UI.rateCard(${idx},3)">Good<span>Effort</span></button>
                <button class="rate-btn easy ${state.score===4?'selected':''}" onclick="UI.rateCard(${idx},4)">Easy<span>Instant</span></button>
              </div>` : ''}

            <div style="margin-top:10px">
              <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();UI.openDrawer('${item.paper}',${item.si},${item.ti})">Notes & sources</button>
            </div>
          </div>` : ''}
        </div>`;
      });
    }

    document.getElementById('today-content').innerHTML = `
    <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:18px">
      <div class="ph">Today's session</div>
      <div class="ps">${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})}</div>
    </div>

    <div class="today-grid">
      <div>
        <div class="queue-hdr">
          <div class="ring-wrap">
            <svg width="44" height="44" viewBox="0 0 44 44">
              <circle cx="22" cy="22" r="18" fill="none" stroke="var(--bg3)" stroke-width="4"/>
              <circle cx="22" cy="22" r="18" fill="none" stroke="var(--accent)" stroke-width="4"
                stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
                stroke-linecap="round" transform="rotate(-90 22 22)"
                style="transition:stroke-dashoffset 0.5s ease"/>
            </svg>
            <div class="ring-info">
              <h4>${done} / ${total} done</h4>
              <p>Interleaved · target ${target}</p>
            </div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="UI.buildQueue();UI.initCardStates();UI.renderToday();">↺ Refresh</button>
        </div>
        ${qHTML}
      </div>

      <div class="side-stack">
        <div class="scard">
          <div class="scard-title">Current phase</div>
          <div style="font-size:14px;font-weight:600;margin-bottom:4px">${phase?.name || '—'}</div>
          <div style="font-size:12px;color:var(--text2);line-height:1.5">${phase?.goal || ''}</div>
          <div class="neuro-note">⚡ ${phase?.neuro || ''}</div>
        </div>

        <div class="scard">
          <div class="scard-title">This week</div>
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
            <span style="font-size:20px;font-weight:700">${weekDone}</span>
            <span style="font-size:11px;color:var(--text3)">target: ${weekTarget}</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.min(100,Math.round(weekDone/Math.max(weekTarget,1)*100))}%;background:var(--accent)"></div>
          </div>
        </div>

        <div class="scard">
          <div class="scard-title">Pace check</div>
          <div class="pace-line"><span class="lbl">Days to exam</span><span class="val">${pace.daysLeft}</span></div>
          <div class="pace-line"><span class="lbl">Topics unseen</span><span class="val">${pace.unseen}</span></div>
          <div class="pace-line"><span class="lbl">Status</span><span class="val ${pace.status}">${pace.status.replace('-',' ')}</span></div>
          <div style="font-size:11px;color:var(--text3);margin-top:6px;font-style:italic">${pace.msg}</div>
        </div>

        <div class="scard">
          <div class="scard-title">Today</div>
          <div style="display:flex;gap:10px">
            <div style="text-align:center"><div style="font-size:20px;font-weight:700;color:var(--red)">${stats.overdue}</div><div style="font-size:11px;color:var(--text3)">overdue</div></div>
            <div style="text-align:center"><div style="font-size:20px;font-weight:700;color:var(--amber)">${stats.due - stats.overdue}</div><div style="font-size:11px;color:var(--text3)">due</div></div>
            <div style="text-align:center"><div style="font-size:20px;font-weight:700;color:var(--green)">${stats.strong}</div><div style="font-size:11px;color:var(--text3)">strong</div></div>
            <div style="text-align:center"><div style="font-size:20px;font-weight:700;color:var(--text3)">${stats.unseen}</div><div style="font-size:11px;color:var(--text3)">unseen</div></div>
          </div>
        </div>
      </div>
    </div>`;
  },

  // Card states — independent per card, not sequential
  cardStates: {},

  initCardStates() {
    this.cardStates = {};
    this.queue.forEach((_, i) => { this.cardStates[i] = { done: false, score: null, expanded: false }; });
  },

  toggleCard(idx) {
    if (!this.cardStates[idx]) this.cardStates[idx] = { done: false, score: null, expanded: false };
    // Close all others, open this one (accordion — one at a time reduces cognitive load)
    const wasOpen = this.cardStates[idx].expanded;
    Object.keys(this.cardStates).forEach(k => { this.cardStates[k].expanded = false; });
    this.cardStates[idx].expanded = !wasOpen;
    this.renderToday();
  },

  markStudied(idx) {
    const item = this.queue[idx];
    if (!item) return;
    const existing = DB.getRecord(item.paper, item.si, item.ti) || SRS.newRecord();
    const updated = SRS.review({ ...existing, firstStudied: todayStr() }, 3);
    DB.setRecord(item.paper, item.si, item.ti, updated);
    if (!this.cardStates[idx]) this.cardStates[idx] = { done: false, score: null, expanded: false };
    this.cardStates[idx].done = true;
    this.cardStates[idx].score = 3;
    this.cardStates[idx].expanded = false;
    this.doneToday = Object.values(this.cardStates).filter(s => s.done).length;
    DB.saveQueueState(this.queue, this.doneToday);
    this.updateHeader();
    this.updateNavPcts();
    this.renderToday();
    this.toast('Studied ✓');
  },

  rateCard(idx, score) {
    const item = this.queue[idx];
    if (!item) return;
    const existing = DB.getRecord(item.paper, item.si, item.ti) || SRS.newRecord();
    const updated = SRS.review(existing, score);
    DB.setRecord(item.paper, item.si, item.ti, updated);
    // Update card state — always editable, never locked
    if (!this.cardStates[idx]) this.cardStates[idx] = { done: false, score: null, expanded: true };
    this.cardStates[idx].done = true;
    this.cardStates[idx].score = score;
    this.cardStates[idx].expanded = false;
    this.doneToday = Object.values(this.cardStates).filter(s => s.done).length;
    DB.saveQueueState(this.queue, this.doneToday);
    this.updateHeader();
    this.updateNavPcts();
    const labels = ['', 'Again — see you tomorrow', 'Hard — short interval', 'Good — interval grows', 'Easy — accelerated'];
    this.toast(labels[score]);
    this.renderToday();
  },

  // ─── SYLLABUS ──────────────────────────────────────────────────────────────
  renderSyllabus() {
    const paper = this.currentPaper;
    const info = SYLLABUS[paper];
    const cov = Analytics.paperCoverage(paper);
    const str = Analytics.paperStrength(paper);

    let html = `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap">
      <div>
        <div class="ph">${info.label} — <span style="font-weight:400;font-size:16px">${info.full}</span></div>
        <div class="ps" style="margin-top:4px">Coverage ${cov}% · Avg strength ${str}%</div>
      </div>
    </div>
    <div class="paper-tabs">
      ${PAPER_ORDER.map(p => `<button class="paper-tab ${p===paper?'active':''}" style="${p===paper?'background:'+SYLLABUS[p].color+';border-color:'+SYLLABUS[p].color:''}" onclick="UI.showPaper('${p}')">${SYLLABUS[p].label}</button>`).join('')}
    </div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:14px">
      <span style="color:var(--cyan)">●</span> Cyan = your addition &nbsp;
      Click row to open detail &nbsp; Click header to expand/collapse
    </div>`;

    info.subjects.forEach((subj, si) => {
      const allTopics = [...subj.topics, ...(subj.additions || [])];
      const covered = allTopics.filter((_, ti) => DB.getRecord(paper, si, ti)?.firstStudied).length;
      const pct = allTopics.length ? Math.round(covered / allTopics.length * 100) : 0;
      const coaching = DB.getCoaching(paper, subj.name);
      const coachPct = coaching.total > 0 ? Math.round(coaching.completed / coaching.total * 100) : 0;

      html += `
      <div class="subject-block">
        <div class="subject-hdr" onclick="UI.toggleSubject('sb-${paper}-${si}','sa-${paper}-${si}')">
          <span class="subject-name">${subj.name}</span>
          <div class="subject-meta">
            <div class="prog-sm"><div class="prog-sm-fill" style="width:${pct}%;background:${info.color}"></div></div>
            <span class="subject-pct" style="color:${info.color}">${covered}/${allTopics.length}</span>
            <span class="subject-arrow" id="sa-${paper}-${si}">▾</span>
          </div>
        </div>

        <div id="sb-${paper}-${si}" style="display:none">
          <!-- Coaching lecture row -->
          <div class="lecture-row">
            <span class="lecture-label">🎓 Coaching lectures</span>
            <div class="lecture-inputs">
              <input class="lecture-inp" type="text" placeholder="Academy name"
                value="${coaching.academy || ''}"
                onchange="UI.saveCoaching('${paper}','${subj.name.replace(/'/g,"\\'")}',this,'academy')"
                style="width:110px">
              <input class="lecture-inp" type="number" min="0" placeholder="Total"
                value="${coaching.total || ''}"
                onchange="UI.saveCoaching('${paper}','${subj.name.replace(/'/g,"\\'")}',this,'total')">
              <span class="lecture-prog">/</span>
              <input class="lecture-inp" type="number" min="0" placeholder="Done"
                value="${coaching.completed || ''}"
                onchange="UI.saveCoaching('${paper}','${subj.name.replace(/'/g,"\\'")}',this,'completed')">
              ${coaching.total > 0 ? `<span class="lecture-prog">${coachPct}%</span>` : ''}
            </div>
          </div>

          <table class="topic-tbl">
            <thead>
              <tr style="background:var(--bg3)">
                <td style="font-size:11px;color:var(--text3);padding:6px 16px;font-weight:600">Topic (official UPSC wording)</td>
                <td style="font-size:11px;color:var(--text3);padding:6px;font-weight:600;width:90px">Status</td>
                <td style="font-size:11px;color:var(--text3);padding:6px;font-weight:600;width:55px">PYQ</td>
                <td style="font-size:11px;color:var(--text3);padding:6px;font-weight:600;width:80px">Strength</td>
              </tr>
            </thead>
            <tbody>`;

      // Official topics
      subj.topics.forEach((topic, ti) => {
        html += this.topicRow(paper, si, ti, topic, false, info.color);
      });

      // User additions
      (subj.additions || []).forEach((topic, ai) => {
        const ti = subj.topics.length + ai;
        html += this.topicRow(paper, si, ti, topic, true, info.color);
      });

      html += `</tbody></table>

          <!-- Add topic row -->
          <div class="add-topic-row">
            <div class="add-topic-form">
              <input class="field" type="text" id="add-inp-${paper}-${si}"
                placeholder="Add your own topic under this subject..."
                onkeydown="if(event.key==='Enter')UI.addTopic('${paper}',${si})">
              <button class="btn btn-ghost btn-sm" onclick="UI.addTopic('${paper}',${si})">+ Add</button>
            </div>
          </div>
        </div>
      </div>`;
    });

    document.getElementById('syllabus-content').innerHTML = html;
  },

  topicRow(paper, si, ti, topic, isAddition, color) {
    const rec = DB.getRecord(paper, si, ti);
    const str = SRS.strength(rec);
    let badge, bClass;
    if (!rec?.firstStudied) { badge = 'Unseen'; bClass = 'b-new'; }
    else if (rec.nextReview && rec.nextReview < todayStr()) { badge = 'Due'; bClass = 'b-due'; }
    else if (rec.repetitions < 2) { badge = 'Studying'; bClass = 'b-studying'; }
    else if (rec.lastScore <= 2) { badge = 'Fragile'; bClass = 'b-review'; }
    else { badge = 'Strong'; bClass = 'b-strong'; }
    if (isAddition) bClass = 'b-addition';
    const pyqVal = rec?.pyqSeen || '';
    const pyqStyle = pyqVal ? `background:${pyqColor(pyqVal)};color:#000;` : '';

    return `<tr onclick="UI.openDrawer('${paper}',${si},${ti})">
      <td class="t-name">${isAddition ? `<span style="color:var(--cyan);font-size:10px">+</span> ` : ''}${topic}</td>
      <td><span class="t-badge ${bClass}">${badge}</span></td>
      <td>${pyqVal ? `<span class="pyq-color" style="${pyqStyle}"></span><span style="font-size:11px;color:var(--text2)">${pyqVal}%</span>` : '<span style="font-size:11px;color:var(--text3)">—</span>'}</td>
      <td><div class="str-mini"><div class="str-mini-fill" style="width:${str}%;background:${color}"></div></div></td>
    </tr>`;
  },

  toggleSubject(id, arrowId) {
    const el = document.getElementById(id);
    const ar = document.getElementById(arrowId);
    if (!el) return;
    const open = el.style.display !== 'none';
    el.style.display = open ? 'none' : 'block';
    if (ar) ar.textContent = open ? '▾' : '▴';
  },

  saveCoaching(paper, subjectName, el, field) {
    const c = DB.getCoaching(paper, subjectName);
    c[field] = field === 'academy' ? el.value : parseInt(el.value) || 0;
    DB.setCoaching(paper, subjectName, c);
  },

  addTopic(paper, si) {
    const inp = document.getElementById(`add-inp-${paper}-${si}`);
    const topic = inp?.value?.trim();
    if (!topic) return;
    Additions.add(paper, si, topic);
    inp.value = '';
    this.renderSyllabus();
    this.toast('Topic added ✓');
  },

  // ─── DRAWER ────────────────────────────────────────────────────────────────
  openDrawer(paper, si, ti) {
    const subj = SYLLABUS[paper].subjects[si];
    const allTopics = [...subj.topics, ...(subj.additions || [])];
    const topic = allTopics[ti];
    const isAddition = ti >= subj.topics.length;
    const rec = DB.getRecord(paper, si, ti) || SRS.newRecord();
    const info = SYLLABUS[paper];

    document.getElementById('drawer-content').innerHTML = `
    <div class="d-paper" style="color:${info.color}">${info.label} · ${subj.name}${isAddition ? ' · <span style="color:var(--cyan)">Your addition</span>' : ''}</div>
    <div class="d-topic">${topic}</div>

    <!-- History -->
    <div class="d-section">
      <div class="d-label">SRS history</div>
      <div class="d-history">
        ${rec.firstStudied ? `First studied: ${fmtDate(rec.firstStudied)}<br>` : '<span style="color:var(--text3)">Not yet studied</span><br>'}

        ${rec.nextReview ? `Next review: ${fmtDate(rec.nextReview)} (in ${rec.interval}d)<br>` : ''}
        ${rec.repetitions ? `Repetitions: ${rec.repetitions}<br>` : ''}

      <div class="d-label">Sources</div>

        <div class="src-row">
          <label>Read</label>
          <select class="field" id="d-ncert" style="flex:1" onchange="UI.saveSource('${paper}',${si},${ti})">
            <option value="" ${!rec.ncert?'selected':''}>— Not read</option>
            <option value="yes" ${rec.ncert==='yes'?'selected':''}>Yes — read</option>
          </select>
        </div>
        ${rec.ncert === 'yes' ? `
        <div class="src-row">
          <label>Confidence</label>
          <select class="field" id="d-ncert-conf" style="flex:1" onchange="UI.saveSource('${paper}',${si},${ti})">
            <option value="">— Select</option>
            <option value="again" ${rec.ncertConf==='again'?'selected':''}>Again — very unclear</option>
            <option value="hard" ${rec.ncertConf==='hard'?'selected':''}>Hard — partially clear</option>
            <option value="good" ${rec.ncertConf==='good'?'selected':''}>Good — mostly clear</option>
            <option value="easy" ${rec.ncertConf==='easy'?'selected':''}>Easy — fully clear</option>
          </select>
        </div>` : ''}
      </div>

      <!-- Source 2: Reference Book -->
      <div class="source-block">
        <div class="source-title"><span class="source-icon">📚</span> Reference book</div>
        <div class="src-row">
          <label>Book name</label>
          <input class="field" type="text" id="d-ref-book" placeholder="e.g. Spectrum, Bipin Chandra..."
            value="${rec.refBook || ''}" list="ref-books-list" onchange="UI.saveSource('${paper}',${si},${ti})">
          <datalist id="ref-books-list" id="ref-books-datalist"></datalist>
        </div>
        <div class="src-row">
          <label>Section / Part</label>
          <textarea class="field" id="d-ref-section" rows="2"
            placeholder="Ch.4 temple architecture, Ch.7 Bhakti movement..."
            onchange="UI.saveSource('${paper}',${si},${ti})">${rec.refSection || ''}</textarea>
        </div>
      </div>

      <!-- Source 3: PYQ -->
      <div class="source-block">
        <div class="source-title"><span class="source-icon">📝</span> PYQ</div>
        <div class="src-row">
          <label>PYQ seen %</label>
          <input type="number" id="d-pyq-seen" min="0" max="100"
            value="${rec.pyqSeen || ''}" placeholder="0–100"
            onchange="UI.saveSource('${paper}',${si},${ti})">
          ${rec.pyqSeen ? `<span class="pyq-color" style="background:${pyqColor(rec.pyqSeen)}"></span>` : ''}
        </div>
        <div class="src-row">
          <label>Evaluation</label>
          <select class="field" id="d-pyq-eval" style="flex:1" onchange="UI.saveSource('${paper}',${si},${ti})">

            <option value="low" ${rec.pyqEval==='low'?'selected':''}>Self — Low</option>
            <option value="avg" ${rec.pyqEval==='avg'?'selected':''}>Self — Average</option>
            <option value="good" ${rec.pyqEval==='good'?'selected':''}>Self — Good</option>
            <option value="excellent" ${rec.pyqEval==='excellent'?'selected':''}>Self — Excellent</option>
          </select>

        <div class="src-row">
          <label>Third-party reviewed</label>

    </div>

    <!-- Notes -->
    <div class="d-section">
      <div class="d-label">Notes</div>
      <textarea class="field" id="d-notes" placeholder="Key points, doubts, connections, things to remember..."
        rows="4">${rec.notes || ''}</textarea>
      <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="UI.saveNotes('${paper}',${si},${ti})">Save notes</button>
    </div>

    <!-- AI hooks -->
    <div class="d-section">
      <div class="d-label">AI features <span style="font-size:10px;color:var(--text3);font-style:italic">(available when API key is set)</span></div>

      <button class="ai-hook" disabled>Generate 5 probable questions<span class="ai-hook-tag">AI_HOOK</span></button>
      <button class="ai-hook" disabled>Link to recent current affairs<span class="ai-hook-tag">AI_HOOK</span></button>
    </div>`;

    // Populate ref book datalist
    this.populateRefBooks();
    document.getElementById('drawer-overlay').classList.add('open');
  },

  populateRefBooks() {
    const seen = new Set();
    Object.values(DB.data).forEach(rec => { if (rec.refBook) seen.add(rec.refBook); });
    const dl = document.getElementById('ref-books-datalist');
    if (dl) dl.innerHTML = [...seen].map(b => `<option value="${b}">`).join('');
  },

  saveSource(paper, si, ti) {
    const k = DB.key(paper, si, ti);
    if (!DB.data[k]) DB.data[k] = SRS.newRecord();
    const r = DB.data[k];
    const ncertEl = document.getElementById('d-ncert');
    const ncertConfEl = document.getElementById('d-ncert-conf');
    const refBookEl = document.getElementById('d-ref-book');
    const refSecEl = document.getElementById('d-ref-section');
    const pyqSeenEl = document.getElementById('d-pyq-seen');
    const pyqEvalEl = document.getElementById('d-pyq-eval');
    const pyqTpEl = document.getElementById('d-pyq-tp');
    if (ncertEl) r.ncert = ncertEl.value;
    if (ncertConfEl) r.ncertConf = ncertConfEl.value;
    if (refBookEl) r.refBook = refBookEl.value;
    if (refSecEl) r.refSection = refSecEl.value;
    if (pyqSeenEl) r.pyqSeen = pyqSeenEl.value;
    if (pyqEvalEl) r.pyqEval = pyqEvalEl.value;
    if (pyqTpEl) r.pyqThirdParty = pyqTpEl.value;
    DB.save();
    this.toast('Saved');
    // Re-render NCERT confidence field if needed
    if (ncertEl) this.openDrawer(paper, si, ti);
  },

  saveNotes(paper, si, ti) {
    const k = DB.key(paper, si, ti);
    if (!DB.data[k]) DB.data[k] = SRS.newRecord();
    DB.data[k].notes = document.getElementById('d-notes')?.value || '';
    DB.save();
    this.toast('Notes saved ✓');
  },

  closeDrawer(e) {
    if (e && e.target !== document.getElementById('drawer-overlay')) return;
    document.getElementById('drawer-overlay').classList.remove('open');
    if (this.currentPage === 'syllabus') this.renderSyllabus();
  },

  // ─── BULK ONBOARDING ───────────────────────────────────────────────────────
  renderOnboard() {
    let html = `
    <div style="margin-bottom:20px">
      <div class="ph">Bulk onboarding</div>
      <div class="ps" style="margin-top:4px">Initialise your existing preparation in one go. Tick what you've covered and set confidence — the SRS seeds itself.</div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
      <button class="btn btn-primary btn-sm" onclick="UI.onboardApply()">Apply all & seed SRS</button>
      <button class="btn btn-ghost btn-sm" onclick="UI.onboardCheckAll(true)">Check all</button>
      <button class="btn btn-ghost btn-sm" onclick="UI.onboardCheckAll(false)">Uncheck all</button>
    </div>
    <div class="onboard-grid">`;

    PAPER_ORDER.forEach(paper => {
      const info = SYLLABUS[paper];
      html += `<div class="ob-paper">
        <div class="ob-paper-hdr" style="color:${info.color}" onclick="UI.toggleOnboardPaper('ob-${paper}','ob-arr-${paper}')">
          ${info.label} <span style="margin-left:auto;color:var(--text3)" id="ob-arr-${paper}">▾</span>
        </div>
        <div id="ob-${paper}" style="display:none">`;

      SYLLABUS[paper].subjects.forEach((subj, si) => {
        const allTopics = [...subj.topics, ...(subj.additions || [])];
        allTopics.forEach((topic, ti) => {
          const rec = DB.getRecord(paper, si, ti);
          const studied = !!rec?.firstStudied;
          const conf = rec?.lastScore ? ['','again','hard','good','easy'][rec.lastScore] : 'good';
          html += `<div class="ob-topic-row" onclick="UI.toggleOBCheck('ob-chk-${paper}-${si}-${ti}')">
            <div class="ob-check ${studied?'checked':''}" id="ob-chk-${paper}-${si}-${ti}">${studied?'✓':''}</div>
            <div class="ob-name">${topic.length > 55 ? topic.substring(0,55)+'...' : topic}</div>
            <div class="ob-conf">
              <select onclick="event.stopPropagation()" id="ob-conf-${paper}-${si}-${ti}">
                <option value="again" ${conf==='again'?'selected':''}>Again</option>
                <option value="hard" ${conf==='hard'?'selected':''}>Hard</option>
                <option value="good" ${conf==='good'?'selected':''}>Good</option>
                <option value="easy" ${conf==='easy'?'selected':''}>Easy</option>
              </select>
            </div>
          </div>`;
        });
      });

      html += `</div></div>`;
    });

    html += `</div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-top:8px;font-size:13px;color:var(--text2);line-height:1.7">
      <strong style="color:var(--text)">How this works:</strong> Check topics you have already studied. Set confidence honestly.
      Click "Apply all" — the SRS algorithm seeds each checked topic with the right starting interval based on your confidence.
      Unchecked topics remain unseen and will appear as new in your daily queue.
    </div>`;

    document.getElementById('onboard-content').innerHTML = html;
  },

  toggleOnboardPaper(id, arrId) {
    const el = document.getElementById(id);
    const ar = document.getElementById(arrId);
    if (!el) return;
    const open = el.style.display !== 'none';
    el.style.display = open ? 'none' : 'block';
    if (ar) ar.textContent = open ? '▾' : '▴';
  },

  toggleOBCheck(id) {
    const el = document.getElementById(id);
    if (!el) return;
    const checked = el.classList.toggle('checked');
    el.textContent = checked ? '✓' : '';
  },

  onboardCheckAll(check) {
    document.querySelectorAll('.ob-check').forEach(el => {
      el.classList.toggle('checked', check);
      el.textContent = check ? '✓' : '';
    });
  },

  onboardApply() {
    let count = 0;
    PAPER_ORDER.forEach(paper => {
      SYLLABUS[paper].subjects.forEach((subj, si) => {
        const allTopics = [...subj.topics, ...(subj.additions || [])];
        allTopics.forEach((_, ti) => {
          const chkEl = document.getElementById(`ob-chk-${paper}-${si}-${ti}`);
          const confEl = document.getElementById(`ob-conf-${paper}-${si}-${ti}`);
          if (chkEl?.classList.contains('checked') && confEl) {
            const existing = DB.getRecord(paper, si, ti) || SRS.newRecord();
            if (!existing.firstStudied) {
              const updated = SRS.seedFromConf(confEl.value);
              DB.setRecord(paper, si, ti, updated);
              count++;
            }
          }
        });
      });
    });
    this.updateHeader();
    this.updateNavPcts();
    this.buildQueue();
    this.toast(`${count} topics seeded into SRS ✓`);
    this.show('today');
  },

  // ─── GAP ANALYSIS ──────────────────────────────────────────────────────────
  renderGaps() {
    const stats = Queue.stats();
    let html = `
    <div style="margin-bottom:20px">
      <div class="ph">Gap analysis</div>
      <div class="ps" style="margin-top:4px">Where you are vs where you need to be. Gap score = weighted unseen + fragile topics.</div>
    </div>
    <div class="metrics" style="grid-template-columns:repeat(4,1fr)">
      <div class="metric"><div class="m-label">Total topics</div><div class="m-val">${stats.total}</div><div class="m-sub">across all papers</div></div>
      <div class="metric"><div class="m-label">Studied</div><div class="m-val" style="color:var(--accent)">${stats.studied}</div><div class="m-sub">${Math.round(stats.studied/Math.max(stats.total,1)*100)}% first pass</div></div>
      <div class="metric"><div class="m-label">Strong</div><div class="m-val" style="color:var(--green)">${stats.strong}</div><div class="m-sub">retention > 70%</div></div>
      <div class="metric"><div class="m-label">Unseen</div><div class="m-val" style="color:var(--red)">${stats.unseen}</div><div class="m-sub">never studied</div></div>
    </div>
    <div class="section-hdr"><h3>Gap score by paper</h3><span>Lower is better · 0 = no gaps · 100 = all unseen</span></div>
    <div class="gap-grid">`;

    PAPER_ORDER.forEach(p => {
      const gap = Analytics.gapScore(p);
      const cov = Analytics.paperCoverage(p);
      const str = Analytics.paperStrength(p);
      const info = SYLLABUS[p];
      const gapColor = gap > 70 ? 'var(--red)' : gap > 40 ? 'var(--amber)' : 'var(--green)';
      html += `<div class="gap-card">
        <div class="gap-paper" style="color:${info.color}">${info.label}</div>
        <div class="gap-num" style="color:${gapColor}">${gap}<span style="font-size:14px;color:var(--text3)"> / 100</span></div>
        <div class="gap-row"><span class="gap-lbl">Coverage</span><div class="gap-trk"><div class="gap-fill" style="width:${cov}%;background:${info.color}"></div></div><span class="gap-pct">${cov}%</span></div>
        <div class="gap-row"><span class="gap-lbl">Strength</span><div class="gap-trk"><div class="gap-fill" style="width:${str}%;background:var(--green)"></div></div><span class="gap-pct">${str}%</span></div>
        <div class="gap-row"><span class="gap-lbl">Gap</span><div class="gap-trk"><div class="gap-fill" style="width:${gap}%;background:${gapColor}"></div></div><span class="gap-pct">${gap}%</span></div>
        <button class="btn btn-ghost btn-sm" style="margin-top:10px;width:100%" onclick="UI.showPaper('${p}')">View ${info.label} →</button>
      </div>`;
    });

    html += `</div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;font-size:13px;color:var(--text2);line-height:1.7">
      <strong style="color:var(--text)">Gap score formula:</strong>
      Unseen = 1.0 · Again = 0.8 · Hard = 0.5 · Good = 0.2 · Easy = 0.
      Gap score is the weighted % of unresolved knowledge gaps per paper. Below 30 = well covered.
      <!-- AI_HOOK: personalised gap remediation plan -->
    </div>`;

    document.getElementById('gaps-content').innerHTML = html;
  },

  // ─── BATTLE PLAN ───────────────────────────────────────────────────────────
  renderPlan() {
    const year = this.currentYear;
    const phases = PHASES[year];
    const curPhase = Plan.current(year);
    const pace = Plan.pace(year);
    const weekDone = Plan.weekDone();
    const today = todayStr();

    let html = `
    <div class="plan-hdr">
      <div><div class="ph">Battle plan</div><div class="ps" style="margin-top:2px">Neuroscience-sequenced roadmap to Prelims</div></div>
      <div class="year-toggle">
        <button class="yr-btn ${year===2027?'active':''}" onclick="UI.setYear(2027)">CSE 2027</button>
        <button class="yr-btn ${year===2028?'active':''}" onclick="UI.setYear(2028)">CSE 2028</button>
      </div>
    </div>

    <div class="metrics" style="grid-template-columns:repeat(3,1fr)">
      <div class="metric"><div class="m-label">Days to Prelims</div><div class="m-val" style="color:var(--accent)">${pace.daysLeft}</div><div class="m-sub">Prelims ${year}</div></div>
      <div class="metric"><div class="m-label">Pace</div><div class="m-val" style="font-size:18px;color:var(--${pace.status==='on-track'?'green':pace.status==='watch'?'amber':'red'})">${pace.status.replace('-',' ')}</div><div class="m-sub">${pace.msg}</div></div>
      <div class="metric"><div class="m-label">This week</div><div class="m-val">${weekDone}<span style="font-size:13px;color:var(--text3)"> / ${curPhase?.weekly||6}</span></div><div class="m-sub">${Math.round(weekDone/Math.max(curPhase?.weekly||6,1)*100)}% of weekly target</div></div>
    </div>

    <div class="section-hdr" style="margin-bottom:14px"><h3>Phase timeline</h3><span>Where you are & what comes next</span></div>`;

    phases.forEach((phase, idx) => {
      const isPast = today > phase.end;
      const isCurrent = today >= phase.start && today <= phase.end;
      const isLast = idx === phases.length - 1;
      const cls = isPast ? 'past' : isCurrent ? 'current' : '';

      html += `<div class="phase-block">
        <div class="phase-line">
          <div class="phase-circle ${cls}"><div class="ph-dot"></div></div>
          ${!isLast ? `<div class="ph-conn ${isPast?'past':''}"></div>` : ''}
        </div>
        <div class="phase-content ${cls}">
          <div class="ph-tag">${phase.tag}${isCurrent?' · You are here':''}</div>
          <div class="ph-name">${phase.name}</div>
          <div class="ph-dates">${fmtDate(phase.start)} → ${fmtDate(phase.end)} · ${phase.weekly} topics/week · ${phase.daily}h/day</div>
          <div class="ph-goal">${phase.goal}</div>
          <div class="ph-neuro">⚡ ${phase.neuro}</div>
        </div>
      </div>`;
    });

    html += `
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-top:8px;font-size:13px;color:var(--text2);line-height:1.8">
      <strong style="color:var(--text)">The neuroscience behind this plan:</strong><br>
      <strong style="color:var(--text)">Foundation:</strong> Encoding phase. New pathways form. Breadth first, depth later.<br>
      <strong style="color:var(--text)">Deepening:</strong> Consolidation. Myelin thickens on pathways you revisit. Hard topics need more repetitions.<br>
      <strong style="color:var(--text)">Integration:</strong> Interleaving across subjects builds flexible retrieval — 30–40% better than blocked practice.<br>
      <strong style="color:var(--text)">Sprint:</strong> Retrieval practice. Testing yourself is 2× more effective than re-reading.
    </div>`;

    document.getElementById('plan-content').innerHTML = html;
  },

  setYear(year) {
    this.currentYear = year;
    DB.settings.targetYear = year;
    DB.save();
    this.updateHeader();
    this.renderPlan();
  },

  // ─── STATS ─────────────────────────────────────────────────────────────────
  renderStats() {
    const activity = Analytics.activity90();
    const stats = Queue.stats();
    const streak = DB.settings.streak || 0;
    const heatCells = activity.map(d => {
      const l = d.count === 0 ? 0 : d.count < 3 ? 1 : d.count < 6 ? 2 : 3;
      return `<div class="ah-cell l${l}" title="${d.date}: ${d.count} topics"></div>`;
    }).join('');

    let html = `
    <div style="margin-bottom:20px"><div class="ph">Stats</div><div class="ps" style="margin-top:4px">Your preparation fingerprint</div></div>
    <div class="metrics">
      <div class="metric"><div class="m-label">Streak</div><div class="m-val" style="color:var(--amber)">🔥 ${streak}</div><div class="m-sub">consecutive days</div></div>
      <div class="metric"><div class="m-label">Studied</div><div class="m-val" style="color:var(--accent)">${stats.studied}</div><div class="m-sub">of ${stats.total} topics</div></div>
      <div class="metric"><div class="m-label">Strong</div><div class="m-val" style="color:var(--green)">${stats.strong}</div><div class="m-sub">retention > 70%</div></div>
      <div class="metric"><div class="m-label">Due today</div><div class="m-val" style="color:var(--red)">${stats.due}</div><div class="m-sub">for review</div></div>
    </div>

    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px">
      <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Activity — last 90 days</div>
      <div class="ah-grid">${heatCells}</div>
      <div style="display:flex;align-items:center;gap:4px;margin-top:6px;font-size:11px;color:var(--text3)">
        Less <div class="ah-cell" style="width:11px;height:11px;display:inline-block"></div>
        <div class="ah-cell l1" style="width:11px;height:11px;display:inline-block"></div>
        <div class="ah-cell l2" style="width:11px;height:11px;display:inline-block"></div>
        <div class="ah-cell l3" style="width:11px;height:11px;display:inline-block"></div> More
      </div>
    </div>

    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px">
      <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px">Coverage & strength by paper</div>
      ${PAPER_ORDER.map(p => {
        const cov = Analytics.paperCoverage(p);
        const str = Analytics.paperStrength(p);
        const info = SYLLABUS[p];
        return `<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px">
            <span style="color:var(--text);font-weight:500">${info.label}</span>
            <span style="color:var(--text3)">${cov}% covered · ${str}% strength</span>
          </div>
          <div style="display:flex;gap:4px">
            <div style="flex:1;height:6px;background:var(--bg3);border-radius:999px;overflow:hidden">
              <div style="height:100%;width:${cov}%;background:${info.color};border-radius:999px;transition:width .5s"></div>
            </div>
            <div style="flex:1;height:6px;background:var(--bg3);border-radius:999px;overflow:hidden">
              <div style="height:100%;width:${str}%;background:var(--green);border-radius:999px;transition:width .5s"></div>
            </div>
          </div>
          <div style="display:flex;gap:4px;margin-top:3px;font-size:10px;color:var(--text3)"><span style="flex:1">Coverage</span><span style="flex:1">Retention strength</span></div>
        </div>`;
      }).join('')}
    </div>`;

    document.getElementById('stats-content').innerHTML = html;
  },

  // ─── SETTINGS ──────────────────────────────────────────────────────────────
  renderSettings() {
    const target = DB.settings.dailyTarget || 6;
    document.getElementById('settings-content').innerHTML = `
    <div style="margin-bottom:20px"><div class="ph">Settings</div></div>

    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px">
      <div style="font-size:13px;font-weight:600;margin-bottom:14px">Study preferences</div>
      <div style="margin-bottom:16px">
        <div style="font-size:12px;color:var(--text3);margin-bottom:8px">Daily topic target: <strong id="target-disp">${target}</strong></div>
        <input type="range" min="3" max="15" step="1" value="${target}" style="width:100%"
          oninput="document.getElementById('target-disp').textContent=this.value"
          onchange="DB.settings.dailyTarget=parseInt(this.value);DB.save();UI.buildQueue();">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:4px"><span>3 (light)</span><span>6 (balanced)</span><span>15 (intensive)</span></div>
      </div>
      <div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:8px">Target exam year</div>
        <div style="display:flex;gap:8px">
          <button class="btn ${this.currentYear===2027?'btn-primary':'btn-ghost'}" onclick="UI.setYear(2027)">CSE 2027</button>
          <button class="btn ${this.currentYear===2028?'btn-primary':'btn-ghost'}" onclick="UI.setYear(2028)">CSE 2028</button>
        </div>
      </div>
    </div>

    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px">
      <div style="font-size:13px;font-weight:600;margin-bottom:14px">Data</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="UI.exportData()">Export backup</button>
        <label class="btn btn-ghost" style="cursor:pointer">Import backup<input type="file" accept=".json" style="display:none" onchange="UI.importData(event)"></label>
        <button class="btn btn-red" onclick="UI.resetAll()">Reset all progress</button>
      </div>
    </div>

    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px">About Myelocus v3</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.7">
        Official UPSC syllabus spine · SM-2 SRS (4-point scale) · Interleaved queue · New/review distinction ·
        Four source types · Bulk onboarding · Neuroscience-sequenced battle plan<br>
        <span style="color:var(--text3);font-size:12px;font-style:italic">v3.0 · "The locus where myelin forms."</span>
      </div>
    </div>`;
  },

  exportData() {
    const blob = new Blob([DB.export()], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `myelocus_backup_${todayStr()}.json`;
    a.click();
  },

  importData(e) {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = ev => {
      try { DB.import(ev.target.result); this.init(); this.toast('Imported successfully ✓'); }
      catch(err) { this.toast('Invalid file'); }
    };
    r.readAsText(file);
  },

  resetAll() {
    if (!confirm('Reset all progress? This cannot be undone.')) return;
    localStorage.removeItem('myelocus_v3');
    localStorage.removeItem('myelocus_additions');
    DB.load(); Additions.load(); this.init(); this.toast('Progress reset');
  }
};

// Boot
UI.init();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
</body>
</html>
