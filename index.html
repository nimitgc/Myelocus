<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1117">
<meta name="description" content="Myelocus — UPSC Civil Services preparation tracker">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Myelocus">
<title>Myelocus</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="shell" id="shell">

  <!-- ─── HEADER ─────────────────────────────────────────────────────────── -->
  <header class="header">
    <div class="logo">
      <div class="logo-mark">M</div>
      <div>
        <div class="logo-text">Myelocus</div>
        <div class="logo-sub">Build your neural edge</div>
      </div>
    </div>

    <div class="header-center">
      <div class="countdown-chip" id="countdown-chip">
        <div class="pace-dot" id="pace-dot"></div>
        <span id="countdown-text">Loading...</span>
      </div>
    </div>

    <div class="header-right">
      <div class="streak-chip" id="streak-chip">🔥 0 days</div>
      <button class="icon-btn" onclick="UI.toggleTheme()" title="Toggle theme" id="theme-btn">☀</button>
      <button class="icon-btn" onclick="UI.showPage('settings')" title="Settings">⚙</button>
    </div>
  </header>

  <!-- ─── SIDEBAR ────────────────────────────────────────────────────────── -->
  <nav class="sidebar" id="sidebar">
    <div class="nav-section-label">Study</div>
    <button class="nav-item active" id="nav-today" onclick="UI.showPage('today')">
      <span>⊙</span> Today's queue
      <span class="nav-pct" id="nav-today-count"></span>
    </button>

    <div class="nav-section-label">Syllabus</div>
    <button class="nav-item" id="nav-gs1" onclick="UI.showPage('syllabus','gs1')">
      <span class="nav-dot" style="background:#6366f1"></span> GS 1
      <span class="nav-pct" id="nav-pct-gs1">0%</span>
    </button>
    <button class="nav-item" id="nav-gs2" onclick="UI.showPage('syllabus','gs2')">
      <span class="nav-dot" style="background:#22c55e"></span> GS 2
      <span class="nav-pct" id="nav-pct-gs2">0%</span>
    </button>
    <button class="nav-item" id="nav-gs3" onclick="UI.showPage('syllabus','gs3')">
      <span class="nav-dot" style="background:#f59e0b"></span> GS 3
      <span class="nav-pct" id="nav-pct-gs3">0%</span>
    </button>
    <button class="nav-item" id="nav-gs4" onclick="UI.showPage('syllabus','gs4')">
      <span class="nav-dot" style="background:#a78bfa"></span> GS 4
      <span class="nav-pct" id="nav-pct-gs4">0%</span>
    </button>
    <button class="nav-item" id="nav-prelims" onclick="UI.showPage('syllabus','prelims')">
      <span class="nav-dot" style="background:#f43f5e"></span> Prelims
      <span class="nav-pct" id="nav-pct-prelims">0%</span>
    </button>
    <button class="nav-item" id="nav-optional" onclick="UI.showPage('syllabus','optional')">
      <span class="nav-dot" style="background:#06b6d4"></span> Optional
      <span class="nav-pct" id="nav-pct-optional">0%</span>
    </button>

    <div class="nav-section-label">Insights</div>
    <button class="nav-item" id="nav-gaps" onclick="UI.showPage('gaps')">
      <span>◈</span> Gap analysis
    </button>
    <button class="nav-item" id="nav-plan" onclick="UI.showPage('plan')">
      <span>⊞</span> Battle plan
    </button>
    <button class="nav-item" id="nav-stats" onclick="UI.showPage('stats')">
      <span>◎</span> Stats
    </button>
  </nav>

  <!-- ─── MAIN ────────────────────────────────────────────────────────────── -->
  <main class="main" id="main">

    <!-- TODAY -->
    <div class="page active" id="page-today">
      <div id="today-content"></div>
    </div>

    <!-- SYLLABUS -->
    <div class="page" id="page-syllabus">
      <div id="syllabus-content"></div>
    </div>

    <!-- GAP ANALYSIS -->
    <div class="page" id="page-gaps">
      <div id="gaps-content"></div>
    </div>

    <!-- BATTLE PLAN -->
    <div class="page" id="page-plan">
      <div id="plan-content"></div>
    </div>

    <!-- STATS -->
    <div class="page" id="page-stats">
      <div id="stats-content"></div>
    </div>

    <!-- SETTINGS -->
    <div class="page" id="page-settings">
      <div id="settings-content"></div>
    </div>

  </main>
</div>

<!-- Mobile bottom nav -->
<nav class="bottom-nav">
  <button class="bnav-item active" id="bnav-today" onclick="UI.showPage('today')">
    <span class="bnav-icon">⊙</span><span>Today</span>
  </button>
  <button class="bnav-item" id="bnav-syllabus" onclick="UI.showPage('syllabus','gs1')">
    <span class="bnav-icon">⊞</span><span>Syllabus</span>
  </button>
  <button class="bnav-item" id="bnav-gaps" onclick="UI.showPage('gaps')">
    <span class="bnav-icon">◈</span><span>Gaps</span>
  </button>
  <button class="bnav-item" id="bnav-plan" onclick="UI.showPage('plan')">
    <span class="bnav-icon">◎</span><span>Plan</span>
  </button>
</nav>

<!-- Topic detail drawer -->
<div class="drawer-overlay" id="drawer-overlay" onclick="UI.closeDrawer(event)">
  <div class="drawer" id="drawer">
    <button class="drawer-close" onclick="UI.closeDrawer()">✕</button>
    <div id="drawer-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="syllabus.js"></script>
<script src="app.js"></script>
<script>

// ─── UI CONTROLLER ──────────────────────────────────────────────────────────

const UI = {
  currentPage: 'today',
  currentPaper: 'gs1',
  currentYear: 2027,
  queue: [],
  queueIndex: 0,
  doneToday: 0,

  init() {
    DB.load();
    this.currentYear = DB.getSetting('targetYear') || 2027;
    const theme = DB.getSetting('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('theme-btn').textContent = theme === 'dark' ? '☀' : '☾';
    this.buildQueue();
    this.updateHeader();
    this.updateSidebarPcts();
    this.renderToday();
  },

  buildQueue() {
    const target = DB.getSetting('dailyTarget') || 6;
    this.queue = Queue.build(target);
    this.queueIndex = 0;
    this.doneToday = 0;
  },

  updateHeader() {
    const year = this.currentYear;
    const pace = Plan.paceAnalysis(year);
    const daysLeft = Plan.daysToExam(year);
    const streak = DB.getSetting('streak') || 0;

    document.getElementById('countdown-text').innerHTML =
      `<strong>${daysLeft}</strong> days to Prelims ${year}`;
    const dot = document.getElementById('pace-dot');
    dot.className = `pace-dot ${pace.status}`;
    document.getElementById('streak-chip').textContent = `🔥 ${streak} day${streak !== 1 ? 's' : ''}`;

    const dueCount = Queue.stats().dueToday;
    document.getElementById('nav-today-count').textContent = dueCount > 0 ? dueCount : '';
  },

  updateSidebarPcts() {
    PAPER_ORDER.forEach(p => {
      const pct = Analytics.paperCoverage(p);
      const el = document.getElementById(`nav-pct-${p}`);
      if (el) el.textContent = pct + '%';
    });
  },

  showPage(page, paper) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.bnav-item').forEach(n => n.classList.remove('active'));

    const pageEl = document.getElementById(`page-${page}`);
    if (pageEl) pageEl.classList.add('active');

    const navEl = document.getElementById(`nav-${page}`);
    if (navEl) navEl.classList.add('active');
    const bnavEl = document.getElementById(`bnav-${page}`);
    if (bnavEl) bnavEl.classList.add('active');

    this.currentPage = page;
    if (paper) this.currentPaper = paper;

    if (page === 'today') this.renderToday();
    else if (page === 'syllabus') {
      this.currentPaper = paper || this.currentPaper;
      const navEl2 = document.getElementById(`nav-${this.currentPaper}`);
      if (navEl2) navEl2.classList.add('active');
      this.renderSyllabus();
    }
    else if (page === 'gaps') this.renderGaps();
    else if (page === 'plan') this.renderPlan();
    else if (page === 'stats') this.renderStats();
    else if (page === 'settings') this.renderSettings();

    document.getElementById('main').scrollTop = 0;
  },

  toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    document.getElementById('theme-btn').textContent = next === 'dark' ? '☀' : '☾';
    DB.setSetting('theme', next);
  },

  // ─── TODAY RENDER ──────────────────────────────────────────────────────────

  renderToday() {
    const target = DB.getSetting('dailyTarget') || 6;
    const done = this.doneToday;
    const total = this.queue.length;
    const allDone = done >= total && total > 0;

    const pct = total > 0 ? Math.round(done / total * 100) : 0;
    const circumference = 2 * Math.PI * 18;
    const offset = circumference - (pct / 100) * circumference;

    const phase = Plan.currentPhase(this.currentYear);
    const pace = Plan.paceAnalysis(this.currentYear);
    const weekDone = Plan.progressThisWeek();
    const weekTarget = Plan.weeklyTarget(this.currentYear);

    let queueHTML = '';
    if (total === 0) {
      queueHTML = `<div style="text-align:center;padding:40px 20px;color:var(--text3)">
        <div style="font-size:32px;margin-bottom:12px">◎</div>
        <div style="font-size:15px;font-weight:600;margin-bottom:6px">No topics due today</div>
        <div style="font-size:13px">Your SRS schedule is clear. Review the syllabus map or explore a paper.</div>
      </div>`;
    } else if (allDone) {
      queueHTML = this.completionHTML(done);
    } else {
      this.queue.forEach((item, idx) => {
        const isDone = idx < done;
        const isActive = idx === done;
        const info = SYLLABUS[item.paper];
        const isNew = SRS.isNew(item.rec);
        queueHTML += `
        <div class="queue-card ${isActive ? 'active-card' : ''} ${isDone ? 'done-card' : ''}" id="qcard-${idx}">
          <div class="queue-card-head">
            <div class="queue-num">${isDone ? '✓' : idx + 1}</div>
            <div class="queue-topic">${item.topic}</div>
            <span class="queue-paper-badge" style="background:${info.color}20;color:${info.color}">${info.label}</span>
            <span class="queue-type-badge">${isNew ? 'New' : 'Review'}</span>
          </div>
          ${isActive ? `
          <div class="rating-panel">
            <div class="rating-label">How well did you recall this?</div>
            <div class="rating-btns">
              <button class="rating-btn hard" onclick="UI.rateCard(${idx}, 1)">
                1 — Hard <span>Revisit tomorrow</span>
              </button>
              <button class="rating-btn okay" onclick="UI.rateCard(${idx}, 2)">
                2 — Okay <span>Review in 3 days</span>
              </button>
              <button class="rating-btn easy" onclick="UI.rateCard(${idx}, 3)">
                3 — Easy <span>Longer interval</span>
              </button>
            </div>
            <div style="margin-top:10px;display:flex;gap:8px">
              <button class="btn btn-ghost" style="font-size:12px" onclick="UI.openDrawer('${item.paper}',${item.si},${item.ti})">Notes & history</button>
              <!-- AI_HOOK: generate questions for this topic -->
            </div>
          </div>` : ''}
        </div>`;
      });
    }

    document.getElementById('today-content').innerHTML = `
    <div style="margin-bottom:20px">
      <div style="font-size:20px;font-weight:700;margin-bottom:2px">Today's session</div>
      <div style="font-size:13px;color:var(--text3)">${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})}</div>
    </div>

    <div class="today-layout">
      <div>
        <div class="queue-header">
          <div class="queue-progress">
            <svg class="queue-ring" viewBox="0 0 44 44">
              <circle cx="22" cy="22" r="18" fill="none" stroke="var(--bg3)" stroke-width="4"/>
              <circle cx="22" cy="22" r="18" fill="none" stroke="var(--accent)" stroke-width="4"
                stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
                stroke-linecap="round" transform="rotate(-90 22 22)"
                style="transition:stroke-dashoffset 0.5s ease"/>
            </svg>
            <div>
              <div style="font-size:15px;font-weight:600">${done} / ${total} done</div>
              <div style="font-size:12px;color:var(--text3)">Interleaved · ${target} target</div>
            </div>
          </div>
          <button class="btn btn-ghost" onclick="UI.buildQueue();UI.renderToday();" style="font-size:12px">↺ Refresh queue</button>
        </div>
        ${queueHTML}
      </div>

      <div class="today-side">
        <div class="side-card">
          <div class="side-card-title">Current phase</div>
          <div class="phase-name">${phase ? phase.name : '—'}</div>
          <div class="phase-sub">${phase ? phase.goal : ''}</div>
          <div class="phase-neuro">${phase ? phase.neuroscience : ''}</div>
        </div>

        <div class="side-card">
          <div class="side-card-title">This week</div>
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
            <span style="font-size:22px;font-weight:700">${weekDone}</span>
            <span style="font-size:12px;color:var(--text3)">target: ${weekTarget}</span>
          </div>
          <div class="weekly-bar-track">
            <div class="weekly-bar-fill" style="width:${Math.min(100, Math.round(weekDone/Math.max(weekTarget,1)*100))}%"></div>
          </div>
        </div>

        <div class="side-card">
          <div class="side-card-title">Pace check</div>
          <div class="pace-row">
            <span class="pace-label">Days to exam</span>
            <span class="pace-val">${Plan.daysToExam(this.currentYear)}</span>
          </div>
          <div class="pace-row">
            <span class="pace-label">Topics left</span>
            <span class="pace-val">${Queue.stats().unseen}</span>
          </div>
          <div class="pace-row">
            <span class="pace-label">Status</span>
            <span class="pace-val ${pace.status}">${pace.status.replace('-',' ')}</span>
          </div>
          <div style="font-size:11px;color:var(--text3);margin-top:8px;font-style:italic">${pace.message}</div>
        </div>

        <div class="side-card">
          <div class="side-card-title">Due today</div>
          <div style="display:flex;gap:12px">
            <div style="text-align:center">
              <div style="font-size:22px;font-weight:700;color:var(--red)">${Queue.stats().overdue}</div>
              <div style="font-size:11px;color:var(--text3)">overdue</div>
            </div>
            <div style="text-align:center">
              <div style="font-size:22px;font-weight:700;color:var(--amber)">${Queue.stats().dueToday}</div>
              <div style="font-size:11px;color:var(--text3)">due today</div>
            </div>
            <div style="text-align:center">
              <div style="font-size:22px;font-weight:700;color:var(--green)">${Queue.stats().strong}</div>
              <div style="font-size:11px;color:var(--text3)">strong</div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  },

  completionHTML(done) {
    const streak = DB.getSetting('streak') || 0;
    return `<div class="completion-screen show">
      <div class="completion-icon">◎</div>
      <div class="completion-title">Session complete</div>
      <div class="completion-sub">You studied ${done} topic${done !== 1 ? 's' : ''} today. The pathways strengthen.</div>
      <div class="completion-stats">
        <div class="c-stat"><div class="c-stat-val" style="color:var(--accent)">${done}</div><div class="c-stat-label">Topics today</div></div>
        <div class="c-stat"><div class="c-stat-val" style="color:var(--amber)">🔥 ${streak}</div><div class="c-stat-label">Day streak</div></div>
        <div class="c-stat"><div class="c-stat-val" style="color:var(--green)">${Queue.stats().strong}</div><div class="c-stat-label">Strong topics</div></div>
      </div>
      <button class="btn btn-ghost" onclick="UI.buildQueue();UI.renderToday();">Load more topics</button>
    </div>`;
  },

  rateCard(idx, score) {
    const item = this.queue[idx];
    if (!item) return;
    const existing = DB.getRecord(item.paper, item.si, item.ti) || SRS.newRecord();
    const updated = SRS.review(existing, score);
    DB.setRecord(item.paper, item.si, item.ti, updated);
    this.doneToday++;
    this.updateHeader();
    this.updateSidebarPcts();
    this.renderToday();
  },

  // ─── SYLLABUS RENDER ───────────────────────────────────────────────────────

  renderSyllabus() {
    const paper = this.currentPaper;
    const info = SYLLABUS[paper];
    const cov = Analytics.paperCoverage(paper);
    const str = Analytics.paperStrength(paper);

    let html = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div>
        <div style="font-size:20px;font-weight:700">${info.label} — ${info.short}</div>
        <div style="font-size:13px;color:var(--text3);margin-top:2px">Coverage ${cov}% · Avg strength ${str}%</div>
      </div>
      <div style="display:flex;gap:8px">
        ${PAPER_ORDER.map(p => `<button class="btn ${p === paper ? 'btn-primary' : 'btn-ghost'}" style="padding:6px 10px;font-size:12px" onclick="UI.showPage('syllabus','${p}')">${SYLLABUS[p].label}</button>`).join('')}
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;font-size:12px;color:var(--text3)">
      <span>Strength:</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:var(--bg3);border-radius:2px;display:inline-block"></span>Unseen</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:rgba(99,102,241,0.25);border-radius:2px;display:inline-block"></span>Weak</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:rgba(99,102,241,0.55);border-radius:2px;display:inline-block"></span>Moderate</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:#6366f1;border-radius:2px;display:inline-block"></span>Strong</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:rgba(99,102,241,0.25);border-radius:2px;outline:1px solid var(--red);display:inline-block"></span>Hard last time</span>
    </div>`;

    info.sections.forEach((sec, si) => {
      const secCov = sec.topics.filter((_, ti) => DB.getRecord(paper, si, ti)?.firstStudied).length;
      html += `
      <div class="paper-section">
        <div class="paper-section-head" onclick="UI.toggleSection('sec-${paper}-${si}')">
          <div class="paper-section-title">${sec.name}</div>
          <div class="paper-section-meta">
            <div class="prog-bar-sm"><div class="prog-fill-sm" style="width:${Math.round(secCov/sec.topics.length*100)}%;background:${info.color}"></div></div>
            <span class="paper-cov" style="color:${info.color}">${secCov}/${sec.topics.length}</span>
            <span style="color:var(--text3);font-size:18px" id="sec-arrow-${paper}-${si}">▾</span>
          </div>
        </div>
        <div id="sec-${paper}-${si}" style="display:none">
          <table class="topic-table">
            <thead>
              <tr style="background:var(--bg3)">
                <td style="font-size:11px;color:var(--text3);padding:6px 18px;font-weight:600">Topic</td>
                <td class="tt-status" style="font-size:11px;color:var(--text3);padding:6px;font-weight:600">Status</td>
                <td class="tt-score" style="font-size:11px;color:var(--text3);padding:6px;font-weight:600">Score</td>
                <td class="tt-next" style="font-size:11px;color:var(--text3);padding:6px;font-weight:600">Next review</td>
                <td class="tt-strength" style="font-size:11px;color:var(--text3);padding:6px;font-weight:600">Strength</td>
              </tr>
            </thead>
            <tbody>`;

      sec.topics.forEach((topic, ti) => {
        const rec = DB.getRecord(paper, si, ti);
        const str = SRS.strength(rec);
        const strengthLevel = str === 0 ? 0 : str < 30 ? 1 : str < 60 ? 2 : str < 85 ? 3 : 4;
        let statusLabel, statusClass;
        if (!rec?.firstStudied) { statusLabel = 'Unseen'; statusClass = 'new'; }
        else if (rec.nextReview && rec.nextReview < todayStr()) { statusLabel = 'Due'; statusClass = 'due'; }
        else if (rec.repetitions < 2) { statusLabel = 'Learning'; statusClass = 'learning'; }
        else if (rec.lastScore === 1) { statusLabel = 'Fragile'; statusClass = 'review'; }
        else { statusLabel = 'Strong'; statusClass = 'strong'; }

        html += `<tr onclick="UI.openDrawer('${paper}',${si},${ti})">
          <td class="tt-name">${topic}</td>
          <td class="tt-status"><span class="status-badge ${statusClass}">${statusLabel}</span></td>
          <td class="tt-score">${rec?.lastScore ? ['—','Hard','Okay','Easy'][rec.lastScore] : '—'}</td>
          <td class="tt-next">${rec?.nextReview ? formatDate(rec.nextReview) : '—'}</td>
          <td class="tt-strength"><div class="str-bar"><div class="str-fill" style="width:${str}%;background:${info.color}"></div></div></td>
        </tr>`;
      });

      html += `</tbody></table></div></div>`;
    });

    document.getElementById('syllabus-content').innerHTML = html;
  },

  toggleSection(id) {
    const el = document.getElementById(id);
    const parts = id.split('-');
    const arrow = document.getElementById(`sec-arrow-${parts[1]}-${parts[2]}`);
    if (el.style.display === 'none') { el.style.display = 'block'; if (arrow) arrow.textContent = '▴'; }
    else { el.style.display = 'none'; if (arrow) arrow.textContent = '▾'; }
  },

  // ─── GAP ANALYSIS RENDER ──────────────────────────────────────────────────

  renderGaps() {
    const stats = Queue.stats();
    let html = `
    <div style="margin-bottom:24px">
      <div style="font-size:20px;font-weight:700;margin-bottom:4px">Gap analysis</div>
      <div style="font-size:13px;color:var(--text3)">Where you are vs where you need to be. Gap score = untested + fragile topics.</div>
    </div>

    <div class="metrics-row" style="margin-bottom:24px">
      <div class="metric">
        <div class="metric-label">Total topics</div>
        <div class="metric-val">${stats.total}</div>
        <div class="metric-sub">across all papers</div>
      </div>
      <div class="metric">
        <div class="metric-label">Studied</div>
        <div class="metric-val" style="color:var(--accent)">${stats.studied}</div>
        <div class="metric-sub">${Math.round(stats.studied/stats.total*100)}% first pass</div>
      </div>
      <div class="metric">
        <div class="metric-label">Strong</div>
        <div class="metric-val" style="color:var(--green)">${stats.strong}</div>
        <div class="metric-sub">retention > 70%</div>
      </div>
      <div class="metric">
        <div class="metric-label">Unseen</div>
        <div class="metric-val" style="color:var(--red)">${stats.unseen}</div>
        <div class="metric-sub">never studied</div>
      </div>
    </div>

    <div class="section-header"><span class="section-title">Gap score by paper</span><span class="section-sub">Lower is better</span></div>
    <div class="gap-grid">`;

    PAPER_ORDER.forEach(p => {
      const gap = Analytics.gapScore(p);
      const cov = Analytics.paperCoverage(p);
      const str = Analytics.paperStrength(p);
      const info = SYLLABUS[p];
      const gapColor = gap > 70 ? 'var(--red)' : gap > 40 ? 'var(--amber)' : 'var(--green)';
      html += `
      <div class="gap-card">
        <div class="gap-paper" style="color:${info.color}">${info.label}</div>
        <div class="gap-score-row">
          <div class="gap-score-val" style="color:${gapColor}">${gap}</div>
          <div class="gap-score-label">/ 100 gap</div>
        </div>
        <div class="gap-bars">
          <div class="gap-bar-row">
            <span class="gap-bar-label">Coverage</span>
            <div class="gap-bar-track"><div class="gap-bar-fill" style="width:${cov}%;background:${info.color}"></div></div>
            <span class="gap-bar-val">${cov}%</span>
          </div>
          <div class="gap-bar-row">
            <span class="gap-bar-label">Strength</span>
            <div class="gap-bar-track"><div class="gap-bar-fill" style="width:${str}%;background:var(--green)"></div></div>
            <span class="gap-bar-val">${str}%</span>
          </div>
          <div class="gap-bar-row">
            <span class="gap-bar-label">Gap</span>
            <div class="gap-bar-track"><div class="gap-bar-fill" style="width:${gap}%;background:${gapColor}"></div></div>
            <span class="gap-bar-val">${gap}%</span>
          </div>
        </div>
      </div>`;
    });

    html += `</div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:8px">
      <div style="font-size:12px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em">How gap score works</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.7">
        Unseen topic = 1.0 gap · Rated Hard = 0.7 gap · Rated Okay = 0.3 gap · Rated Easy = 0 gap.
        Gap score is the weighted percentage of unresolved knowledge gaps per paper.
        A gap score below 30 means the paper is well-covered and retained.
        <!-- AI_HOOK: personalised gap remediation suggestions -->
      </div>
    </div>`;

    document.getElementById('gaps-content').innerHTML = html;
  },

  // ─── BATTLE PLAN RENDER ───────────────────────────────────────────────────

  renderPlan() {
    const year = this.currentYear;
    const phases = PHASE_PLAN[year];
    const currentPhase = Plan.currentPhase(year);
    const pace = Plan.paceAnalysis(year);
    const weekDone = Plan.progressThisWeek();
    const weekTarget = Plan.weeklyTarget(year);
    const today = todayStr();

    let html = `
    <div class="plan-header">
      <div>
        <div style="font-size:20px;font-weight:700;margin-bottom:2px">Battle plan</div>
        <div style="font-size:13px;color:var(--text3)">Neuroscience-sequenced roadmap to Prelims</div>
      </div>
      <div class="year-toggle">
        <button class="year-btn ${year===2027?'active':''}" onclick="UI.setYear(2027)">CSE 2027</button>
        <button class="year-btn ${year===2028?'active':''}" onclick="UI.setYear(2028)">CSE 2028</button>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:24px">
      <div class="metric">
        <div class="metric-label">Days to Prelims</div>
        <div class="metric-val" style="color:var(--accent)">${pace.daysLeft}</div>
        <div class="metric-sub">Prelims ${year}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Pace status</div>
        <div class="metric-val" style="font-size:18px;color:var(--${pace.status==='on-track'?'green':pace.status==='watch'?'amber':'red'})">${pace.status.replace('-',' ')}</div>
        <div class="metric-sub">${pace.message}</div>
      </div>
      <div class="metric">
        <div class="metric-label">This week</div>
        <div class="metric-val">${weekDone}<span style="font-size:14px;color:var(--text3)"> / ${weekTarget}</span></div>
        <div class="metric-sub">topics · ${Math.round(weekDone/Math.max(weekTarget,1)*100)}% of weekly target</div>
      </div>
    </div>

    <div class="section-header" style="margin-bottom:16px">
      <span class="section-title">Phase timeline</span>
      <span class="section-sub">Where you are & what comes next</span>
    </div>
    <div class="phases-timeline">`;

    phases.forEach((phase, idx) => {
      const isPast = today > phase.end;
      const isCurrent = today >= phase.start && today <= phase.end;
      const isFuture = today < phase.start;
      const phaseClass = isPast ? 'past' : isCurrent ? 'current' : '';
      const circleClass = isPast ? 'past' : isCurrent ? 'current' : '';
      const isLast = idx === phases.length - 1;

      html += `
      <div class="phase-block">
        <div class="phase-line">
          <div class="phase-circle ${circleClass}"><div class="dot"></div></div>
          ${!isLast ? `<div class="phase-connector ${isPast?'past':''}"></div>` : ''}
        </div>
        <div class="phase-content ${phaseClass}">
          <div class="phase-tag">${phase.label} ${isCurrent ? '← You are here' : ''}</div>
          <div class="phase-title">${phase.name}</div>
          <div class="phase-dates">${formatDate(phase.start)} → ${formatDate(phase.end)} · ${phase.weeklyTopics} topics/week · ${phase.dailyHours}h/day</div>
          <div class="phase-goal">${phase.goal}</div>
          <div class="phase-neuro-note">⚡ ${phase.neuroscience}</div>
        </div>
      </div>`;
    });

    html += `</div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:8px">
      <div style="font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">The neuroscience behind this plan</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.8">
        <strong style="color:var(--text)">Phase 1 (Encoding):</strong> Breadth-first. New neural pathways form. Spacing begins automatically via SRS.<br>
        <strong style="color:var(--text)">Phase 2 (Consolidation):</strong> Myelin thickens on pathways you revisit. Hard topics need more repetitions — the algorithm handles this.<br>
        <strong style="color:var(--text)">Phase 3 (Integration):</strong> Interleaving across subjects builds flexible retrieval — better than blocked practice even if it feels harder.<br>
        <strong style="color:var(--text)">Phase 4 (Retrieval):</strong> Testing yourself is 2x more effective than re-reading. Every mock test is a study session, not just measurement.
      </div>
    </div>`;

    document.getElementById('plan-content').innerHTML = html;
  },

  setYear(year) {
    this.currentYear = year;
    DB.setSetting('targetYear', year);
    this.updateHeader();
    this.renderPlan();
  },

  // ─── STATS RENDER ─────────────────────────────────────────────────────────

  renderStats() {
    const activity = Analytics.activityLast90Days();
    const stats = Queue.stats();
    const streak = DB.getSetting('streak') || 0;

    const maxActivity = Math.max(...activity.map(d => d.count), 1);
    const heatCells = activity.map(d => {
      const lvl = d.count === 0 ? 0 : d.count < 3 ? 1 : d.count < 6 ? 2 : 3;
      return `<div class="ah-cell l${lvl}" title="${d.date}: ${d.count} topics"></div>`;
    }).join('');

    let html = `
    <div style="margin-bottom:24px">
      <div style="font-size:20px;font-weight:700;margin-bottom:4px">Stats</div>
      <div style="font-size:13px;color:var(--text3)">Your preparation fingerprint</div>
    </div>

    <div class="metrics-row">
      <div class="metric">
        <div class="metric-label">Study streak</div>
        <div class="metric-val" style="color:var(--amber)">🔥 ${streak}</div>
        <div class="metric-sub">consecutive days</div>
      </div>
      <div class="metric">
        <div class="metric-label">Topics studied</div>
        <div class="metric-val" style="color:var(--accent)">${stats.studied}</div>
        <div class="metric-sub">of ${stats.total} total</div>
      </div>
      <div class="metric">
        <div class="metric-label">Strong topics</div>
        <div class="metric-val" style="color:var(--green)">${stats.strong}</div>
        <div class="metric-sub">retention > 70%</div>
      </div>
      <div class="metric">
        <div class="metric-label">Due for review</div>
        <div class="metric-val" style="color:var(--red)">${stats.dueToday}</div>
        <div class="metric-sub">today</div>
      </div>
    </div>

    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px">
      <div style="font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px">Activity — last 90 days</div>
      <div class="activity-heatmap">${heatCells}</div>
      <div style="display:flex;gap:8px;margin-top:6px;font-size:11px;color:var(--text3)">
        <span>Less</span>
        <div class="ah-cell" style="width:11px;height:11px;display:inline-block;flex-shrink:0"></div>
        <div class="ah-cell l1" style="width:11px;height:11px;display:inline-block;flex-shrink:0"></div>
        <div class="ah-cell l2" style="width:11px;height:11px;display:inline-block;flex-shrink:0"></div>
        <div class="ah-cell l3" style="width:11px;height:11px;display:inline-block;flex-shrink:0"></div>
        <span>More</span>
      </div>
    </div>

    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px">
      <div style="font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:14px">Strength by paper</div>
      ${PAPER_ORDER.map(p => {
        const cov = Analytics.paperCoverage(p);
        const str = Analytics.paperStrength(p);
        const info = SYLLABUS[p];
        return `<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px">
            <span style="color:var(--text)">${info.label}</span>
            <span style="color:var(--text3)">${cov}% covered · ${str}% strength</span>
          </div>
          <div style="display:flex;gap:4px">
            <div style="flex:1;height:6px;background:var(--bg3);border-radius:999px;overflow:hidden">
              <div style="height:100%;width:${cov}%;background:${info.color};border-radius:999px"></div>
            </div>
            <div style="flex:1;height:6px;background:var(--bg3);border-radius:999px;overflow:hidden">
              <div style="height:100%;width:${str}%;background:var(--green);border-radius:999px"></div>
            </div>
          </div>
          <div style="display:flex;gap:4px;margin-top:3px;font-size:10px;color:var(--text3)">
            <span style="flex:1">Coverage</span><span style="flex:1">Retention</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;

    document.getElementById('stats-content').innerHTML = html;
  },

  // ─── SETTINGS RENDER ──────────────────────────────────────────────────────

  renderSettings() {
    const target = DB.getSetting('dailyTarget') || 6;
    document.getElementById('settings-content').innerHTML = `
    <div style="font-size:20px;font-weight:700;margin-bottom:24px">Settings</div>

    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px">
      <div style="font-size:13px;font-weight:600;margin-bottom:16px">Study preferences</div>

      <div style="margin-bottom:16px">
        <div style="font-size:12px;color:var(--text3);margin-bottom:8px">Daily topic target: <strong id="target-display">${target}</strong></div>
        <input type="range" min="3" max="12" step="1" value="${target}" style="width:100%" oninput="document.getElementById('target-display').textContent=this.value" onchange="DB.setSetting('dailyTarget',parseInt(this.value));UI.buildQueue();">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:4px"><span>3 (light)</span><span>6 (balanced)</span><span>12 (intensive)</span></div>
      </div>

      <div style="margin-bottom:16px">
        <div style="font-size:12px;color:var(--text3);margin-bottom:8px">Target exam year</div>
        <div style="display:flex;gap:8px">
          <button class="btn ${this.currentYear===2027?'btn-primary':'btn-ghost'}" onclick="UI.setYear(2027)">CSE 2027</button>
          <button class="btn ${this.currentYear===2028?'btn-primary':'btn-ghost'}" onclick="UI.setYear(2028)">CSE 2028</button>
        </div>
      </div>
    </div>

    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px">
      <div style="font-size:13px;font-weight:600;margin-bottom:16px">Data</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="UI.exportData()">Export backup</button>
        <label class="btn btn-ghost" style="cursor:pointer">Import backup<input type="file" accept=".json" style="display:none" onchange="UI.importData(event)"></label>
        <button class="btn btn-danger" onclick="UI.resetAll()">Reset all progress</button>
      </div>
    </div>

    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px">About Myelocus</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.7">
        Built on SM-2 spaced repetition · Interleaved queue · Neuroscience-sequenced battle plan<br>
        <span style="color:var(--text3);font-size:12px;font-style:italic">v2.0 · "The locus where myelin forms."</span>
      </div>
    </div>`;
  },

  exportData() {
    const blob = new Blob([DB.export()], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `myelocus_backup_${todayStr()}.json`;
    a.click();
  },

  importData(e) {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = ev => {
      try { DB.import(ev.target.result); this.init(); this.showToast('Imported successfully'); }
      catch(err) { this.showToast('Invalid file'); }
    };
    r.readAsText(file);
  },

  resetAll() {
    if (!confirm('Reset all progress? This cannot be undone.')) return;
    localStorage.removeItem('myelocus_v2');
    DB.load(); this.init(); this.showToast('Progress reset');
  },

  // ─── DRAWER ────────────────────────────────────────────────────────────────

  openDrawer(paper, si, ti) {
    const topic = SYLLABUS[paper].sections[si].topics[ti];
    const rec = DB.getRecord(paper, si, ti);
    const info = SYLLABUS[paper];

    document.getElementById('drawer-content').innerHTML = `
    <div style="font-size:11px;font-weight:600;color:${info.color};text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">${info.label}</div>
    <div class="drawer-topic">${topic}</div>

    <div class="drawer-section">
      <div class="drawer-label">History</div>
      <div class="drawer-history">
        ${rec?.firstStudied ? `First studied: ${formatDate(rec.firstStudied)}<br>` : 'Not yet studied<br>'}
        ${rec?.lastStudied ? `Last studied: ${formatDate(rec.lastStudied)}<br>` : ''}
        ${rec?.nextReview ? `Next review: ${formatDate(rec.nextReview)} (${rec.interval}d interval)<br>` : ''}
        ${rec?.repetitions ? `Repetitions: ${rec.repetitions}<br>` : ''}
        ${rec?.lastScore ? `Last confidence: ${['—','Hard','Okay','Easy'][rec.lastScore]}<br>` : ''}
        ${rec ? `Strength: ${SRS.strength(rec)}%` : ''}
      </div>
    </div>

    <div class="drawer-section">
      <div class="drawer-label">Notes</div>
      <textarea class="field-input" id="d-notes" placeholder="Key points, sources, doubts, connections...">${rec?.notes || ''}</textarea>
      <button class="btn btn-primary" style="margin-top:8px;font-size:12px" onclick="UI.saveNotes('${paper}',${si},${ti})">Save notes</button>
    </div>

    <div class="drawer-section">
      <div class="drawer-label">AI features <span style="font-size:10px;color:var(--text3)">(coming soon)</span></div>
      <button class="ai-hook-btn" disabled>
        Explain this topic for UPSC
        <span class="ai-hook-tag">AI_HOOK</span>
      </button>
      <button class="ai-hook-btn" disabled>
        Generate 5 probable questions
        <span class="ai-hook-tag">AI_HOOK</span>
      </button>
      <button class="ai-hook-btn" disabled>
        Link to recent current affairs
        <span class="ai-hook-tag">AI_HOOK</span>
      </button>
    </div>`;

    document.getElementById('drawer-overlay').classList.add('open');
  },

  saveNotes(paper, si, ti) {
    const k = DB.key(paper, si, ti);
    if (!DB.data[k]) DB.data[k] = SRS.newRecord();
    DB.data[k].notes = document.getElementById('d-notes').value;
    DB.save();
    this.showToast('Notes saved');
  },

  closeDrawer(e) {
    if (e && e.target !== document.getElementById('drawer-overlay')) return;
    document.getElementById('drawer-overlay').classList.remove('open');
  },

  // ─── TOAST ─────────────────────────────────────────────────────────────────

  showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }
};

// Boot
UI.init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
